                <div class="session-stats">

                    <span>Earned this session: <strong id="statEarned">$0.00</strong></span>
                </div>

            </section>

            You're not approved for this project. <a href="worker-tasks.html">Go back to My Tasks</a>.
        </div>

<script>

const urlParams = new URLSearchParams(window.location.search);
const taskId = urlParams.get("taskId");

let currentChallengeId = null;
let payoutAmount = 0;

let sessionSubmissions = 0;
let sessionCorrect = 0;
let sessionEarned = 0;

async function logVisit() {
    try {
        await authFetch(WORKER_URL + "/api/worker/micro-tasks/visit", { method: "POST" });
    } catch (err) {
        console.error("Failed to log visit:", err);
    }
}

async function init() {
    if (!taskId) {
        document.getElementById("loadingState").textContent = "No project specified.";
        return;
    }

    logVisit();

    try {
        const response = await authFetch(WORKER_URL + "/api/worker/micro-tasks");
        const data = await response.json();

        if (!response.ok) {
            document.getElementById("loadingState").textContent = data?.error || "Could not load project.";
            return;
        }

        const task = (data.tasks || []).find(t => String(t.id) === String(taskId));

        if (!task || task.applicationStatus !== "approved") {
            document.getElementById("loadingState").style.display = "none";
            document.getElementById("notApprovedState").style.display = "block";
            return;
        }

       payoutAmount = Number(task.payoutAmount);
        document.getElementById("projectTitle").textContent =
            `Project #${task.id} — ${formatMoney(payoutAmount)} per correct code`;

        document.getElementById("loadingState").style.display = "none";
        document.getElementById("taskContent").style.display = "block";

        await getNextChallenge();

    } catch (err) {
        console.error(err);
        document.getElementById("loadingState").textContent = "Unable to connect to the server.";
    }
}

async function getNextChallenge() {
    const codeDisplay = document.getElementById("codeDisplay");
    const input = document.getElementById("codeInput");
    const submitBtn = document.getElementById("submitBtn");

    codeDisplay.textContent = "------";
    input.value = "";
    input.disabled = true;
    submitBtn.disabled = true;

    try {
        const response = await authFetch(WORKER_URL + `/api/worker/micro-tasks/challenge?taskId=${encodeURIComponent(taskId)}`);
        const data = await response.json();

        if (!response.ok) {
            document.getElementById("feedbackBox").textContent = data?.error || "Could not load a new code.";
            document.getElementById("feedbackBox").className = "feedback-box feedback-incorrect";
            return;
        }

        currentChallengeId = data.challengeId;
        codeDisplay.textContent = data.displayCode;
        input.disabled = false;
        submitBtn.disabled = false;
        input.focus();

    } catch (err) {
        console.error(err);
        document.getElementById("feedbackBox").textContent = "Unable to connect to the server.";
        document.getElementById("feedbackBox").className = "feedback-box feedback-incorrect";
    }
}

async function submitCode() {
    const input = document.getElementById("codeInput");
    const submitBtn = document.getElementById("submitBtn");
    const feedbackBox = document.getElementById("feedbackBox");

    const submittedValue = input.value.trim();

    if (!submittedValue) {
        feedbackBox.textContent = "Please type the code shown above.";
        feedbackBox.className = "feedback-box feedback-incorrect";
        return;
    }

    if (!currentChallengeId) {
        feedbackBox.textContent = "No active code. Please wait for a new one to load.";
        feedbackBox.className = "feedback-box feedback-incorrect";
        return;
    }

    input.disabled = true;
    submitBtn.disabled = true;

    try {
        const response = await authFetch(WORKER_URL + "/api/worker/micro-tasks/submit", {
            method: "POST",
            body: JSON.stringify({ challengeId: currentChallengeId, submittedValue })
        });

        const data = await response.json();

        if (!response.ok) {
            feedbackBox.textContent = data?.error || "Something went wrong. Please try again.";
            feedbackBox.className = "feedback-box feedback-incorrect";
            input.disabled = false;
            submitBtn.disabled = false;
            return;
        }

        sessionSubmissions++;
        if (data.correct) {
            sessionCorrect++;
            sessionEarned += Number(data.earned || 0);
            feedbackBox.textContent = `✅ Correct! You earned ${formatMoney(data.earned)}`;
            feedbackBox.className = "feedback-box feedback-correct";
        } else {
            feedbackBox.textContent = "❌ Incorrect. Try the next code.";
            feedbackBox.className = "feedback-box feedback-incorrect";
        }

        document.getElementById("statSubmissions").textContent = sessionSubmissions;
        document.getElementById("statCorrect").textContent = sessionCorrect;
        document.getElementById("statEarned").textContent = formatMoney(sessionEarned);

        setTimeout(getNextChallenge, 1200);

    } catch (err) {
        console.error(err);
        feedbackBox.textContent = "Unable to connect to the server.";
        feedbackBox.className = "feedback-box feedback-incorrect";
        input.disabled = false;
        submitBtn.disabled = false;
    }
}

document.getElementById("codeInput").addEventListener("keydown", function(e) {
    if (e.key === "Enter") {
        e.preventDefault();
        submitCode();
    }
});

init();

</script>
