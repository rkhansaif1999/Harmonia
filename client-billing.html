<script>

// Orders come from the real backend (D1) via the Worker API, not localStorage.
// Amount per order is read from the order record itself (total_price /
// price_per_review, captured at the time the order was placed) so invoices
// don't shift if the admin changes the global price later. getSettings()
// pricePerReview is only used as a last-resort fallback for old orders that
// may not have those columns populated.

const user = getUser();
const table = document.getElementById("invoiceTable");

async function fetchMyOrders(email) {
    const response = await authFetch(WORKER_URL + "/api/orders?email=" + encodeURIComponent(email));
    const data = await response.json();
    if (!response.ok) throw new Error(data.error || "Failed to load orders");
    return data.orders || [];
}

function getOrderAmount(o, fallbackPricePerReview) {
    if (o.total_price != null && o.total_price !== 0) return o.total_price;
    const perReview = (o.price_per_review != null && o.price_per_review !== 0)
        ? o.price_per_review
        : fallbackPricePerReview;
    return (o.reviews || 0) * perReview;
}

async function renderBilling() {

    let orders;
    try {
        orders = await fetchMyOrders(user.email);
    } catch (err) {
        table.innerHTML = `<tr><td colspan="4" style="color:#ff8080;">Could not load invoices: ${escapeHTML(err.message)}</td></tr>`;
        return;
    }

    const settings = getSettings();

    let totalSpent = 0;
    let outstanding = 0;
    let paidCount = 0;
    let pendingCount = 0;

    table.innerHTML = "";

    if (orders.length === 0) {
        table.innerHTML = `<tr><td colspan="4" class="empty-state">No invoices yet</td></tr>`;
    }

    orders.forEach((o, index) => {
        // "Paid" means payment has been made, regardless of fulfillment
        // stage (Assigned / Under Review / Completed). Only orders still
        // Awaiting Payment are unpaid/outstanding.
        const isPaid = o.status !== "Awaiting Payment";
        const amount = getOrderAmount(o, settings.pricePerReview);

        if (isPaid) {
            totalSpent += amount;
            paidCount++;
        } else {
            outstanding += amount;
            pendingCount++;
        }

        table.innerHTML += `
            <tr>
                <td>#INV-${1000 + index}</td>
                <td>${escapeHTML(o.project_name)}</td>
                <td>$${amount}</td>
                <td>${statusBadge(isPaid ? "Paid" : "Pending")}</td>
            </tr>
        `;
    });

    document.getElementById("totalSpent").textContent = "$" + totalSpent;
    document.getElementById("outstandingBalance").textContent = "$" + outstanding;
    document.getElementById("paidCount").textContent = paidCount;
    document.getElementById("pendingCount").textContent = pendingCount;
}

renderBilling();

</script>
