<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Login - Harmonia</title>

<link rel="stylesheet" href="style.css">

<style>

/* ================================
   EXTRA PREMIUM BACKGROUND LAYER
================================ */

.orb{
  position:fixed;
  border-radius:50%;
  filter:blur(90px);
  opacity:.35;
  animation: float 14s ease-in-out infinite;
  z-index:-2;
}

.orb1{
  width:520px;height:520px;
  background:radial-gradient(circle,#7d79ff,transparent 60%);
  top:10%; left:5%;
}

.orb2{
  width:600px;height:600px;
  background:radial-gradient(circle,#45d7ff,transparent 60%);
  bottom:5%; right:10%;
  animation-duration:18s;
}

.orb3{
  width:420px;height:420px;
  background:radial-gradient(circle,rgba(255,255,255,.2),transparent 60%);
  top:40%; left:50%;
  animation-duration:22s;
}

@keyframes float{
  0%,100%{ transform:translate(0,0); }
  50%{ transform:translate(40px,-60px); }
}

canvas{
  position:fixed;
  inset:0;
  z-index:-1;
  pointer-events:none;
}

/* AUTH BOX */
.auth-box{
    position:relative;
    overflow:hidden;
    border-radius:26px;
    background:rgba(255,255,255,.03);
    border:1px solid rgba(255,255,255,.08);
    backdrop-filter:blur(30px);
    box-shadow:0 30px 90px rgba(0,0,0,.55);
}

.auth-box h2{
    font-size:1.8rem;
    font-weight:800;
    letter-spacing:-1px;
    background:linear-gradient(135deg,#ffffff,#a8b6ff);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

/* ROLE SELECTOR */
.role-selector{
    display:flex;
    justify-content:space-between;
    gap:14px;
    margin:20px 0 24px;
}

.role-card{
    flex:1;
    position:relative;
    padding:18px 12px;
    border-radius:16px;
    border:1px solid rgba(255,255,255,.08);
    background:rgba(255,255,255,.03);
    cursor:pointer;
    text-align:center;
    transition:.28s ease;
}

.role-card.selected{
    border-color:#45d7ff;
    background:rgba(69,215,255,.12);
}

/* MOBILE */
@media (max-width:600px){
    .role-selector{
        flex-direction:column;
    }
}

input{
    transition:.25s ease;
}

input:focus{
    transform:translateY(-2px);
}

</style>

</head>

<body>

<div class="noise"></div>

<div style="position:fixed;inset:0;pointer-events:none;z-index:-2;">
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>
</div>

<canvas id="particles"></canvas>

<div class="auth-container">
<div class="auth-box">

<form onsubmit="loginUser(event)">

<div class="logo" style="margin-bottom:24px;">Harmonia</div>

<h2>Welcome Back</h2>

<input type="email" id="email" placeholder="Email" required>
<input type="password" id="password" placeholder="Password" required>

<div style="text-align:right;margin:-6px 0 12px;">
<a href="forgot-password.html">Forgot password?</a>
</div>

<h4>Choose Account</h4>

<div class="role-selector">

<div class="role-card" onclick="selectRole('admin',this)">
<span>🛡️ Admin</span>
</div>

<div class="role-card" onclick="selectRole('client',this)">
<span>🏢 Client</span>
</div>

<div class="role-card" onclick="selectRole('worker',this)">
<span>👤 Worker</span>
</div>

</div>

<input type="hidden" id="role">

<button class="primary full" type="submit">Login</button>

<p>
Don't have an account?
<a href="signup.html">Sign up</a>
</p>

<a href="index.html">← Back to Home</a>

</form>

</div>
</div>

<script src="script.js"></script>

<script>
function selectRole(role, element){

    document.querySelectorAll(".role-card").forEach(card=>{
        card.classList.remove("selected");
    });

    element.classList.add("selected");

    document.getElementById("role").value = role;

    // ✅ FIX: persist role
    localStorage.setItem("selectedRole", role);
}

// restore role on refresh
window.addEventListener("DOMContentLoaded", () => {
    const saved = localStorage.getItem("selectedRole");

    if(saved){
        document.getElementById("role").value = saved;
    }
});

/* PARTICLES */
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for(let i=0;i<55;i++){
  particles.push({
    x: Math.random()*canvas.width,
    y: Math.random()*canvas.height,
    r: Math.random()*2,
    dx: (Math.random()-0.5)*0.4,
    dy: (Math.random()-0.5)*0.4
  });
}

function animate(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  particles.forEach(p=>{
    p.x += p.dx;
    p.y += p.dy;

    if(p.x < 0 || p.x > canvas.width) p.dx *= -1;
    if(p.y < 0 || p.y > canvas.height) p.dy *= -1;

    ctx.beginPath();
    ctx.fillStyle = "rgba(120,200,255,0.35)";
    ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fill();
  });

  requestAnimationFrame(animate);
}

animate();

window.addEventListener("resize",()=>{
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});
</script>

</body>
</html>
