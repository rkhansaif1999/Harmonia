/* ================================
   EXTRA PREMIUM BACKGROUND LAYER
================================ */

.orb{
  position:fixed;
  border-radius:50%;
  filter:blur(90px);
  opacity:.35;
  animation: float 14s ease-in-out infinite;
  z-index:-2;
}

.orb1{
  width:520px;height:520px;
  background:radial-gradient(circle,#7d79ff,transparent 60%);
  top:10%; left:5%;
}

.orb2{
  width:600px;height:600px;
  background:radial-gradient(circle,#45d7ff,transparent 60%);
  bottom:5%; right:10%;
  animation-duration:18s;
}

.orb3{
  width:420px;height:420px;
  background:radial-gradient(circle,rgba(255,255,255,.2),transparent 60%);
  top:40%; left:50%;
  animation-duration:22s;
}

@keyframes float{
  0%,100%{ transform:translate(0,0); }
  50%{ transform:translate(40px,-60px); }
}

/* canvas particles */
canvas{
  position:fixed;
  inset:0;
  z-index:-1;
  pointer-events:none;
}

/* ================================
   LOGIN LUXURY ENHANCEMENT
================================ */

.auth-box{
    position:relative;
    overflow:hidden;
    border-radius:26px;
    background:rgba(255,255,255,.03);
    border:1px solid rgba(255,255,255,.08);
    backdrop-filter:blur(30px);
    box-shadow:0 30px 90px rgba(0,0,0,.55);
}

/* soft glow behind box */
.auth-box::before{
    content:"";
    position:absolute;
    top:-120px;
    right:-120px;
    width:260px;
    height:260px;
    border-radius:50%;
    background:rgba(125,121,255,.18);
    filter:blur(70px);
    pointer-events:none;
}

.auth-box::after{
    content:"";
    position:absolute;
    bottom:-120px;
    left:-120px;
    width:260px;
    height:260px;
    border-radius:50%;
    background:rgba(69,215,255,.14);
    filter:blur(80px);
    pointer-events:none;
}

/* title upgrade */
.auth-box h2{
    font-size:1.8rem;
    font-weight:800;
    letter-spacing:-1px;
    background:linear-gradient(135deg,#ffffff,#a8b6ff);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

/* ================================
   FIXED ROLE SELECTOR (IMPORTANT)
================================ */

.role-selector{
    display:flex;
    justify-content:space-between;
    gap:14px;
    margin:20px 0 24px;
}

.role-card{
    flex:1;
    position:relative;
    padding:18px 12px;
    border-radius:16px;
    border:1px solid rgba(255,255,255,.08);
    background:rgba(255,255,255,.03);
    cursor:pointer;
    text-align:center;
    transition:.28s ease;
    overflow:hidden;
    min-width:0;
}

.role-card::before{
    content:"";
    position:absolute;
    inset:0;
    background:linear-gradient(135deg,rgba(91,108,255,.15),transparent);
    opacity:0;
    transition:.25s;
}

.role-card:hover{
    transform:translateY(-4px);
    border-color:#7d79ff;
    box-shadow:0 15px 35px rgba(91,108,255,.18);
}

.role-card:hover::before{
    opacity:1;
}

.role-card.selected{
    border-color:#45d7ff;
    background:rgba(69,215,255,.12);
    box-shadow:0 0 28px rgba(69,215,255,.25);
}

.role-card .icon{

    display:block;
    margin-bottom:10px;
}

.role-card .label{
    font-weight:600;
    color:#fff;
}

.role-card .check{

    top:10px;
    right:12px;
    opacity:0;
    color:#7dffb2;
    font-weight:bold;
    transition:.25s;

.role-card.selected .check{

/* MOBILE FIX */

<script>
// If you already have a valid session (still within your 1-hour login
// window), skip the form entirely and go straight to your dashboard,
// instead of making you log in again.
(function restoreExistingSession() {
    const existing = getUser();
    if (!existing || !existing.token) return;

    verifySessionWithServer().then(valid => {
        if (!valid) return; // truly expired/logged out - let them see the form

        switch (existing.role) {
            case "admin": window.location.href = "admin-dashboard.html"; break;
            case "core_team": window.location.href = "admin-dashboard.html"; break;
            case "client": window.location.href = "client-dashboard.html"; break;
            case "worker": window.location.href = "worker-dashboard.html"; break;
            case "reviewer": window.location.href = "reviewer-dashboard.html"; break;
        }
    });
})();
</script>

<script>
function selectRole(role, element){

    document.querySelectorAll(".role-card").forEach(card=>{
        card.classList.remove("selected");
    });

    element.classList.add("selected");

    document.getElementById("role").value = role;
}

/* ================================
   LOGIN (migrated from localStorage to the Worker /api/login route)

   The role cards above are kept purely as a UX gate (pick which
   dashboard you're trying to reach) - the account's REAL role always
   comes from the server's response, never from what was clicked. If
   they don't match, we don't let the login proceed to that dashboard.

   On success we store the session token (sliding 1hr expiry) alongside
   the user object, so other pages can attach it as
   "Authorization: Bearer <token>" on their own API calls.
================================ */

const ROLE_DASHBOARD = {
    admin: "admin-dashboard.html",
    core_team: "admin-dashboard.html",
    client: "client-dashboard.html",
    worker: "worker-dashboard.html",
    reviewer: "reviewer-dashboard.html"
};

// Core Team is an admin-tier role (limited to whichever tabs they were
// granted) - it logs in through the same "Admin" card as a full admin,
// since from a login-page perspective they're both heading to
// admin-dashboard.html. The actual page-by-page restriction happens
// once they're in, via protectPage()'s permission checks.
function roleMatchesSelection(actualRole, selectedRole) {
    if (actualRole === selectedRole) return true;
    if (selectedRole === "admin" && actualRole === "core_team") return true;
    return false;
}

function setMsg(text){
    const el = document.getElementById("loginMsg");
    el.textContent = text || "";
}

async function loginUser(event){
    event.preventDefault();

    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;
    const selectedRole = document.getElementById("role").value;
    const btn = document.getElementById("loginBtn");

    setMsg("");

    if (!selectedRole) {
        setMsg("Please choose an account type above.");
        return;
    }

    if (typeof isLockedOut === "function" && isLockedOut(email)) {
        setMsg("Too many failed attempts. Please wait 5 minutes before trying again.");
        return;
    }

    btn.disabled = true;
    btn.textContent = "Logging in...";

    try {
        const response = await fetch(WORKER_URL + "/api/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email, password })
        });

        const data = await response.json();

        if (!response.ok || !data.user) {
            if (typeof recordFailedAttempt === "function") recordFailedAttempt(email);
            setMsg(data.error || "Invalid email or password.");
            return;
        }

        if (!roleMatchesSelection(data.user.role, selectedRole)) {
            // Credentials were correct, but this account isn't the role
            // they meant to log into. Clean up the session we were just
            // issued rather than leaving it dangling unused.
            try {
                await fetch(WORKER_URL + "/api/logout", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": "Bearer " + data.token
                    },
                    body: JSON.stringify({})
                });
            } catch (e) { /* best-effort cleanup, ignore failures */ }

            setMsg(`This account is registered as "${data.user.role}", not "${selectedRole}". Please select the correct account type.`);
            return;
        }

        if (typeof clearLoginAttempts === "function") clearLoginAttempts(email);

        // Store the session token so other pages can send it as a
        // bearer token, and keep using saveUser() so every existing
        // page that calls getUser() keeps working unchanged.
        localStorage.setItem("harmonia_token", data.token);
        localStorage.setItem("harmonia_token_expires_at", String(data.expiresAt));
        saveUser(data.user, data.token);

        const destination = ROLE_DASHBOARD[data.user.role] || "index.html";
        window.location.href = destination;

    } catch (err) {
        setMsg("Could not reach the server. Please check your connection and try again.");
    } finally {
        btn.disabled = false;
        btn.textContent = "Login";
    }
}

/* PARTICLES */
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for(let i=0;i<55;i++){
  particles.push({
    x: Math.random()*canvas.width,
    y: Math.random()*canvas.height,
    r: Math.random()*2,
    dx: (Math.random()-0.5)*0.4,
    dy: (Math.random()-0.5)*0.4
  });
}

function animate(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  particles.forEach(p=>{
    p.x += p.dx;
    p.y += p.dy;

    if(p.x < 0 || p.x > canvas.width) p.dx *= -1;
    if(p.y < 0 || p.y > canvas.height) p.dy *= -1;

    ctx.beginPath();
    ctx.fillStyle = "rgba(120,200,255,0.35)";
    ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fill();
  });

  requestAnimationFrame(animate);
}

animate();

window.addEventListener("resize",()=>{
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});
</script>
