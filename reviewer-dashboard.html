<body>

<div class="noise"></div>

<script src="script.js"></script>

<script>
    protectPage("reviewer");
</script>

<div class="dashboard">

    <!-- Sidebar -->
    <aside class="sidebar">

        <h2 class="logo">Harmonia</h2>

        <ul>
            <li class="active">🧾 Review Queue</li>
            <li>💰 Earnings</li>
            <li>👤 Profile</li>
            <li><a href="#" onclick="logout()">🚪 Logout</a></li>
        </ul>

    </aside>

    <!-- Main -->
    <main class="main">

        <header class="topbar">
            <h1>Review Queue</h1>
            <div class="profile">Reviewer</div>
        </header>

        <section class="cards">

            <div class="dashboard-card">
                <h3>Pending Review</h3>
                <h2 id="pendingCount">0</h2>
            </div>

            <div class="dashboard-card">
                <h3>Approved (All Time)</h3>
                <h2 id="approvedCount">0</h2>
            </div>

            <div class="dashboard-card">
                <h3>Rejected (All Time)</h3>
                <h2 id="rejectedCount">0</h2>
            </div>

            <div class="dashboard-card">
                <h3>Total Earned</h3>
                <h2 id="totalEarned">$0.00</h2>
            </div>

        </section>

        <section class="recent">

            <h2>Submissions Awaiting Review</h2>

            <table>

                <thead>
                    <tr>
                        <th>Project</th>
                        <th>Category</th>
                        <th>Reviews</th>
                        <th>Worker</th>
                        <th>Action</th>
                    </tr>
                </thead>

                <tbody id="queueTable">
                    <tr><td colspan="5" class="empty-state">Loading...</td></tr>
                </tbody>

            </table>

        </section>

    </main>

</div>

<script>

const user = getUser();

// Worker names aren't included on the order rows returned by
// /api/reviewer/queue (that endpoint only knows assigned_to as an
// id). We don't have a public "list users" endpoint the reviewer
// can call, so for now we show a short worker reference like
// "Worker #14" instead of a full name. If/when there's a lightweight
// endpoint to resolve a few user ids to names, swap this out.
function workerLabel(assignedTo) {
    return assignedTo ? `Worker #${assignedTo}` : "Unassigned";
}

async function loadStats() {
    try {
        const response = await authFetch(WORKER_URL + "/api/reviewer/stats");
        const data = await response.json();

        if (!response.ok) {
            console.error("Failed to load stats:", data?.error);
            return;
        }

        document.getElementById("approvedCount").textContent = data.approvedCount;
        document.getElementById("rejectedCount").textContent = data.rejectedCount;
        document.getElementById("totalEarned").textContent = "$" + Number(data.totalEarned).toFixed(2);
    } catch (err) {
        console.error(err);
    }
}

async function loadQueue() {
    const table = document.getElementById("queueTable");

    try {
        const response = await authFetch(WORKER_URL + "/api/reviewer/queue");
        const data = await response.json();

        if (!response.ok) {
            table.innerHTML = `<tr><td colspan="5" class="empty-state">Couldn't load the queue. Try refreshing.</td></tr>`;
            console.error("Failed to load queue:", data?.error);
            return;
        }

        const queue = data.queue || [];
        document.getElementById("pendingCount").textContent = queue.length;

        table.innerHTML = "";

        if (queue.length === 0) {
            table.innerHTML = `<tr><td colspan="5" class="empty-state">No submissions waiting right now 🎉</td></tr>`;
            return;
        }

        queue.forEach(order => {
            const row = document.createElement("tr");
            row.innerHTML = `
                <td>${escapeHTML(order.project_name)}</td>
                <td>${escapeHTML(order.category)}</td>
                <td>${order.reviews}</td>
                <td>${escapeHTML(workerLabel(order.assigned_to))}</td>
                <td>
                    <button class="approve-btn" data-order-id="${escapeHTML(order.order_id)}">Approve</button>
                    <button class="reject-btn" data-order-id="${escapeHTML(order.order_id)}">Reject</button>
                </td>
            `;
            table.appendChild(row);
        });

        // Delegate clicks rather than inline onclick, since order_id
        // is a UUID string (not a bare number like the old localStorage id).
        table.querySelectorAll(".approve-btn").forEach(btn => {
            btn.addEventListener("click", () => approve(btn.dataset.orderId, btn));
        });
        table.querySelectorAll(".reject-btn").forEach(btn => {
            btn.addEventListener("click", () => reject(btn.dataset.orderId, btn));
        });

    } catch (err) {
        table.innerHTML = `<tr><td colspan="5" class="empty-state">Couldn't load the queue. Try refreshing.</td></tr>`;
        console.error(err);
    }
}

async function refreshAll() {
    await Promise.all([loadQueue(), loadStats()]);
}

async function approve(orderId, btn) {
    btn.disabled = true;
    btn.textContent = "Approving...";

    try {
        const response = await authFetch(WORKER_URL + "/api/reviewer/approve", {
            method: "POST",
            body: JSON.stringify({ orderId })
        });
        const data = await response.json();

        if (!response.ok) {
            alert(data?.error || "Failed to approve this submission.");
            btn.disabled = false;
            btn.textContent = "Approve";
            return;
        }

        await refreshAll();
    } catch (err) {
        alert("Unable to connect to the server.");
        console.error(err);
        btn.disabled = false;
        btn.textContent = "Approve";
    }
}

async function reject(orderId, btn) {
    const reason = prompt("Reason for rejecting this submission?", "Needs more detail / quality issue");
    if (reason === null) return; // cancelled
    if (!reason.trim()) {
        alert("Please provide a reason for rejecting this submission.");
        return;
    }

    btn.disabled = true;
    btn.textContent = "Rejecting...";

    try {
        const response = await authFetch(WORKER_URL + "/api/reviewer/reject", {
            method: "POST",
            body: JSON.stringify({ orderId, reason: reason.trim() })
        });
        const data = await response.json();

        if (!response.ok) {
            alert(data?.error || "Failed to reject this submission.");
            btn.disabled = false;
            btn.textContent = "Reject";
            return;
        }

        await refreshAll();
    } catch (err) {
        alert("Unable to connect to the server.");
        console.error(err);
        btn.disabled = false;
        btn.textContent = "Reject";
    }
}

refreshAll();

</script>

</body>
