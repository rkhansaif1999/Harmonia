<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Messages - Harmonia</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .msg-row { cursor: pointer; transition: background 0.15s ease; }
        .msg-row td { vertical-align: top; }
        .msg-row:hover { background: rgba(255,255,255,0.04); }

        .msg-expanded td {
            padding: 0;
            border: none;
        }

        .expanded-content {
            display: flex;
            flex-direction: column;
            gap: 14px;
            margin: 4px 0 18px 0;
            padding: 22px 24px;
            background: linear-gradient(180deg, rgba(255,255,255,0.045), rgba(255,255,255,0.02));
            border: 1px solid rgba(255,255,255,0.09);
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.28), inset 0 1px 0 rgba(255,255,255,0.04);
        }

        .expanded-content .block-label {
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: #7fa8ff;
            margin: 0 0 8px 0;
        }

        .expanded-content .full-message {
            white-space: pre-wrap;
            word-break: break-word;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 8px;
            padding: 12px 14px;
            margin: 0;
            color: #e8ecf5;
            line-height: 1.55;
        }

        .expanded-content .full-message.reply-block {
            border-left: 3px solid #7fa8ff;
        }

        .expanded-content textarea {
            font-family: inherit;
            font-size: 14px;
            padding: 12px 14px;
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 8px;
            resize: vertical;
            box-sizing: border-box;
            background: rgba(255,255,255,0.03);
            color: #e8ecf5;
            line-height: 1.5;
        }
        .expanded-content textarea:focus {
            outline: none;
            border-color: #7fa8ff;
            background: rgba(255,255,255,0.05);
        }
        .expanded-content textarea::placeholder {
            color: rgba(232,236,245,0.4);
        }

        .expanded-content .reply-actions {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .expanded-content button {
            align-self: flex-start;
            cursor: pointer;
            background: #3a6df0;
            color: #fff;
            border: none;
            padding: 10px 18px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 14px;
            transition: background 0.15s ease, transform 0.1s ease;
        }
        .expanded-content button:hover {
            background: #5081ff;
        }
        .expanded-content button:active {
            transform: scale(0.98);
        }

        .reply-status {
            font-size: 13px;
            font-weight: 500;
        }
    </style>
</head>
<body>
<div class="noise"></div>
<script src="script.js?v=2"></script>
<script>
    protectPage("admin");
</script>
<div class="dashboard">
    <!-- Sidebar -->
    <aside class="sidebar">
        <h2 class="logo">Harmonia</h2>
        <ul>
            <li><a href="admin-dashboard.html">📊 Dashboard</a></li>
            <li><a href="admin-workers.html">👥 Workers</a></li>
            <li><a href="admin-clients.html">🏢 Clients</a></li>
            <li><a href="admin-projects.html">📂 Projects</a></li>
            <li>📋 Tasks</li>
            <li class="active">✉️ Messages</li>
            <li>💰 Payments</li>
            <li>📈 Analytics</li>
            <li><a href="admin-settings.html">⚙ Settings</a></li>
            <li><a href="login.html" onclick="logout()">🚪 Logout</a></li>
        </ul>
    </aside>
    <!-- Main -->
    <main class="main">
        <header class="topbar">
            <h1>Contact Messages</h1>
            <div class="profile">Administrator</div>
        </header>
        <section class="recent">
            <h2>Inbox</h2>
            <table>
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Type</th>
                        <th>Message</th>
                        <th>Date</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="messagesTable"></tbody>
            </table>
        </section>
    </main>
</div>
<script>
// Keeps track of which message rows are currently expanded
let expandedIds = new Set();

async function renderMessages(){
    const data = await getContactMessages();
    const messages = (data.messages || []).slice().reverse();
    const table = document.getElementById("messagesTable");
    table.innerHTML = "";
    if (messages.length === 0) {
        table.innerHTML = `<tr><td colspan="7" class="empty-state">No messages yet</td></tr>`;
        return;
    }
    messages.forEach(m => {
        const isExpanded = expandedIds.has(m.id);

        table.innerHTML += `
            <tr class="msg-row" onclick="toggleExpand(${m.id})">
                <td>${escapeHTML(m.name)}</td>
                <td>${escapeHTML(m.email)}</td>
                <td>${escapeHTML(m.type)}</td>
                <td style="max-width:260px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;" title="${escapeHTML(m.message)}">${escapeHTML(m.message)}</td>
                <td>${m.created_at || ""}</td>
                <td>${statusBadge(m.status)}</td>
                <td><button type="button" onclick="event.stopPropagation(); deleteMsg(${m.id})">🗑 Delete</button></td>
            </tr>
        `;

        if (isExpanded) {
            table.innerHTML += `
                <tr class="msg-expanded" onclick="event.stopPropagation()">
                    <td colspan="7">
                        <div class="expanded-content">
                            <div>
                                <p class="block-label">Full message</p>
                                <p class="full-message">${escapeHTML(m.message)}</p>
                            </div>
                            ${m.admin_reply ? `
                                <div>
                                    <p class="block-label">Previous reply · ${m.replied_at || ""}</p>
                                    <p class="full-message reply-block">${escapeHTML(m.admin_reply)}</p>
                                </div>
                            ` : ""}
                            <div>
                                <p class="block-label">Reply to ${escapeHTML(m.name)}</p>
                                <textarea id="reply-${m.id}" rows="4" style="width:100%;" placeholder="Type your reply here..."></textarea>
                            </div>
                            <div class="reply-actions">
                                <button type="button" onclick="sendReply(${m.id})">📤 Send Reply</button>
                                <span class="reply-status" id="reply-status-${m.id}"></span>
                            </div>
                        </div>
                    </td>
                </tr>
            `;
        }
    });
}

function toggleExpand(id){
    if (expandedIds.has(id)) {
        expandedIds.delete(id);
    } else {
        expandedIds.add(id);
        // Mark as read in the background, don't re-render again from this call
        markRead(id, false);
    }
    renderMessages();
}

async function markRead(id, shouldRerender = true){
    await fetch(WORKER_URL + "/api/admin/contact-messages/read", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ id })
    });
    if (shouldRerender) renderMessages();
}

async function sendReply(id){
    const textarea = document.getElementById(`reply-${id}`);
    const statusEl = document.getElementById(`reply-status-${id}`);
    const message = textarea.value.trim();

    if (!message) {
        statusEl.textContent = "Please type a reply first.";
        statusEl.style.color = "#c0392b";
        return;
    }

    statusEl.textContent = "Sending...";
    statusEl.style.color = "#888";

    try {
        const res = await fetch(WORKER_URL + "/api/admin/contact-messages/reply", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ id, message })
        });
        const result = await res.json().catch(() => ({}));

        if (!res.ok) {
            statusEl.textContent = "Failed to send: " + (result.error || res.status);
            statusEl.style.color = "#c0392b";
            return;
        }

        statusEl.textContent = "Reply sent ✔";
        statusEl.style.color = "#2e7d32";
        setTimeout(renderMessages, 700);
    } catch (err) {
        statusEl.textContent = "Failed to send: " + err.message;
        statusEl.style.color = "#c0392b";
    }
}

async function deleteMsg(id){
    if (!confirm("Delete this message?")) return;
    expandedIds.delete(id);
    await deleteMessage(id);
    renderMessages();
}

renderMessages();
</script>
</body>
</html>
