       <section class="recent">
            <h2>Send Announcement</h2>

            <div class="card" style="max-width:520px;">

                <label>Send to</label>
                <select id="announceAudience" style="width:100%;margin-bottom:12px;">
                    <option value="workers">All Workers</option>
                    <option value="clients">All Clients</option>
                </select>

                <label>Subject</label>
                <input type="text" id="announceSubject" placeholder="e.g. Scheduled maintenance this weekend" style="width:100%;box-sizing:border-box;margin-bottom:12px;">

                <label>Message</label>
                <textarea id="announceMessage" rows="5" placeholder="Type your announcement here..." style="width:100%;box-sizing:border-box;"></textarea>

                <div style="display:flex;align-items:center;gap:12px;margin-top:12px;">
                    <button class="primary" onclick="handleSendAnnouncement()">📢 Send Announcement</button>
                    <span class="reply-status" id="announceStatus"></span>
                </div>

            </div>

        </section>

        <section class="recent">
            <h2>Inbox</h2>
            <table>
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Type</th>
                        <th>Message</th>
                        <th>Date</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="messagesTable"></tbody>
            </table>
        </section>

</div>
<script>
// Keeps track of which message rows are currently expanded
let expandedIds = new Set();

async function renderMessages(){
    const data = await getContactMessages();
    const messages = (data.messages || []).slice().reverse();
    const table = document.getElementById("messagesTable");
    table.innerHTML = "";
    if (messages.length === 0) {
        table.innerHTML = `<tr><td colspan="7" class="empty-state">No messages yet</td></tr>`;
        return;
    }
    messages.forEach(m => {
        const isExpanded = expandedIds.has(m.id);

        table.innerHTML += `
            <tr class="msg-row" onclick="toggleExpand(${m.id})">
                <td>${escapeHTML(m.name)}</td>
                <td>${escapeHTML(m.email)}</td>
                <td>${escapeHTML(m.type)}</td>
                <td style="max-width:260px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;" title="${escapeHTML(m.message)}">${escapeHTML(m.message)}</td>
                <td>${m.created_at || ""}</td>
                <td>${statusBadge(m.status)}</td>
                <td><button type="button" onclick="event.stopPropagation(); deleteMsg(${m.id})">🗑 Delete</button></td>
            </tr>
        `;

        if (isExpanded) {
            table.innerHTML += `
                <tr class="msg-expanded" onclick="event.stopPropagation()">
                    <td colspan="7">
                        <div class="expanded-content">
                            <div>
                                <p class="block-label">Full message</p>
                                <p class="full-message">${escapeHTML(m.message)}</p>
                            </div>
                            ${m.admin_reply ? `
                                <div>
                                    <p class="block-label">Previous reply · ${m.replied_at || ""}</p>
                                    <p class="full-message reply-block">${escapeHTML(m.admin_reply)}</p>
                                </div>
                            ` : ""}
                            <div>
                                <p class="block-label">Reply to ${escapeHTML(m.name)}</p>
                                <textarea id="reply-${m.id}" rows="4" style="width:100%;" placeholder="Type your reply here..."></textarea>
                            </div>
                            <div class="reply-actions">
                                <button type="button" onclick="sendReply(${m.id})">📤 Send Reply</button>
                                <span class="reply-status" id="reply-status-${m.id}"></span>
                            </div>
                        </div>
                    </td>
                </tr>
            `;
        }
    });
}

function toggleExpand(id){
    if (expandedIds.has(id)) {
        expandedIds.delete(id);
    } else {
        expandedIds.add(id);
        // Mark as read in the background, don't re-render again from this call
        markRead(id, false);
    }
    renderMessages();
}

async function markRead(id, shouldRerender = true){
    await authFetch(WORKER_URL + "/api/admin/contact-messages/read", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ id })
    });
    if (shouldRerender) renderMessages();
}

async function sendReply(id){
    const textarea = document.getElementById(`reply-${id}`);
    const statusEl = document.getElementById(`reply-status-${id}`);
    const message = textarea.value.trim();

    if (!message) {
        statusEl.textContent = "Please type a reply first.";
        statusEl.style.color = "#c0392b";
        return;
    }

    statusEl.textContent = "Sending...";
    statusEl.style.color = "#888";

    try {
        const res = await authFetch(WORKER_URL + "/api/admin/contact-messages/reply", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ id, message })
        });
        const result = await res.json().catch(() => ({}));

        if (!res.ok) {
            statusEl.textContent = "Failed to send: " + (result.error || res.status);
            statusEl.style.color = "#c0392b";
            return;
        }

        statusEl.textContent = "Reply sent ✔";
        statusEl.style.color = "#2e7d32";
        setTimeout(renderMessages, 700);
    } catch (err) {
        statusEl.textContent = "Failed to send: " + err.message;
        statusEl.style.color = "#c0392b";
    }
}

async function deleteMsg(id){
    if (!confirm("Delete this message?")) return;
    expandedIds.delete(id);
    await deleteMessage(id);
    renderMessages();
}

async function handleSendAnnouncement() {
    const audience = document.getElementById("announceAudience").value;
    const subject = document.getElementById("announceSubject").value.trim();
    const message = document.getElementById("announceMessage").value.trim();
    const statusEl = document.getElementById("announceStatus");

    if (!subject || !message) {
        statusEl.textContent = "Please fill in both subject and message.";
        statusEl.style.color = "#c0392b";
        return;
    }

    const label = audience === "workers" ? "all workers" : "all clients";
    if (!confirm(`Send this announcement to ${label}?`)) return;

    statusEl.textContent = "Sending...";
    statusEl.style.color = "#888";

    const result = await sendAnnouncement(audience, subject, message);

    if (result.error) {
        statusEl.textContent = "Failed: " + result.error;
        statusEl.style.color = "#c0392b";
        return;
    }

    statusEl.textContent = `Sent to ${result.sentCount} of ${result.recipientCount} ${label} ✔`;
    statusEl.style.color = "#2e7d32";
    document.getElementById("announceSubject").value = "";
    document.getElementById("announceMessage").value = "";
}

renderMessages();
</script>
