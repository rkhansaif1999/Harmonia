<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Tasks - Harmonia</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="noise"></div>
<script src="script.js"></script>
<script>
    protectPage("worker");
</script>
<div class="dashboard">
    <!-- Sidebar -->
    <aside class="sidebar">
        <h2 class="logo">Harmonia</h2>
        <ul>
            <li><a href="worker-dashboard.html">🏠 Dashboard</a></li>
            <li class="active">✅ My Tasks</li>
            <li><a href="worker-earnings.html">💰 Earnings</a></li>
            <li><a href="worker-payments.html">🏦 Payments</a></li>
            <li><a href="login.html" onclick="logout()">🚪 Logout</a></li>
        </ul>
    </aside>
    <!-- Main -->
    <main class="main">
        <header class="topbar">
            <h1>My Tasks</h1>
            <div class="profile">
                Worker
            </div>
        </header>
        <section class="recent">
            <h2>Assigned Tasks</h2>
            <table>
                <thead>
                    <tr>
                        <th>Project</th>
                        <th>Category</th>
                        <th>Status</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="taskTable">
                    <tr><td colspan="4" class="empty-state">Loading tasks...</td></tr>
                </tbody>
            </table>
        </section>
    </main>
</div>
<script>
const table = document.getElementById("taskTable");

// =========================================================
// Tasks now live in D1 (the "orders" table), reached through the
// Worker's authenticated /api/worker/tasks routes - no more
// localStorage. authFetch() (defined in script.js) automatically
// attaches the logged-in worker's session token.
// =========================================================

async function fetchTasks() {
    try {
        const response = await authFetch(WORKER_URL + "/api/worker/tasks");

        let data;
        try {
            data = await response.json();
        } catch (e) {
            table.innerHTML = `<tr><td colspan="4" class="empty-state">Server returned an invalid response.</td></tr>`;
            return;
        }

        if (!response.ok) {
            table.innerHTML = `<tr><td colspan="4" class="empty-state">${escapeHTML(data?.error || "Could not load tasks.")}</td></tr>`;
            return;
        }

        renderTasks(data.tasks || []);

    } catch (err) {
        console.error(err);
        table.innerHTML = `<tr><td colspan="4" class="empty-state">Unable to connect to the server.</td></tr>`;
    }
}

function renderTasks(tasks) {
    table.innerHTML = "";

    if (tasks.length === 0) {
        table.innerHTML = `
            <tr>
                <td colspan="4" class="empty-state">No tasks assigned yet</td>
            </tr>
        `;
        return;
    }

    tasks.forEach(task => {
        let actionButtons = "";

        if (task.status === "Needs Revision") {
            actionButtons = `<button onclick="resubmit('${task.order_id}')">Resubmit</button>`;
        } else if (task.status === "Completed") {
            actionButtons = "✅ Done";
        } else if (task.status === "In Review") {
            actionButtons = "⏳ Awaiting review";
        } else if (task.status === "In Progress") {
            actionButtons = `<button onclick="submitTask('${task.order_id}')">Submit</button>`;
        } else {
            actionButtons = `
                <button onclick="startTask('${task.order_id}')">Start</button>
                <button onclick="submitTask('${task.order_id}')">Submit</button>
            `;
        }

        table.innerHTML += `
            <tr>
                <td>${escapeHTML(task.project_name)}</td>
                <td>${escapeHTML(task.category)}</td>
                <td>${statusBadge(task.status)}${task.status === "Needs Revision" && task.rejection_reason ? `<div style="color:#9dadc1;font-size:.8rem;margin-top:6px;">— ${escapeHTML(task.rejection_reason)}</div>` : ""}</td>
                <td>${actionButtons}</td>
            </tr>
        `;
    });
}

async function callTaskAction(path, orderId, busyLabel) {
    try {
        const response = await authFetch(WORKER_URL + path, {
            method: "POST",
            body: JSON.stringify({ orderId })
        });

        let data;
        try {
            data = await response.json();
        } catch (e) {
            alert("Server returned an invalid response.");
            return;
        }

        if (!response.ok) {
            alert(data?.error || "Something went wrong. Please try again.");
            return;
        }

        await fetchTasks();

    } catch (err) {
        alert("Unable to connect to the server.");
        console.error(err);
    }
}

function startTask(orderId) {
    callTaskAction("/api/worker/tasks/start", orderId);
}

function submitTask(orderId) {
    callTaskAction("/api/worker/tasks/submit", orderId);
}

function resubmit(orderId) {
    callTaskAction("/api/worker/tasks/submit", orderId);
}

fetchTasks();
</script>
</body>
</html>
