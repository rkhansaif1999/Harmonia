<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact - Harmonia</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- BASE EFFECT (KEEP YOUR CSS SAFE) -->
<div class="noise"></div>

<!-- STRONG PREMIUM ORB LAYER -->
<div class="orb-layer">
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>
</div>

<!-- PARTICLES (slightly denser than other pages = more premium feel) -->
<canvas id="particles"></canvas>

<!-- NAVBAR -->
<nav class="navbar" id="navbar">
  <div class="logo">Harmonia</div>

  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="pricing.html">Pricing</a>
    <a href="contact.html" class="current">Contact</a>
    <a href="login.html">Login</a>
  </div>
</nav>

<main class="container">

  <!-- HERO -->
  <section class="page-hero">
    <div class="section-tag">Contact</div>

    <h1>
      Get in
      <span style="background:linear-gradient(135deg,#8d82ff,#4ad6ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;">
        Touch
      </span>
    </h1>

    <p>
      Questions about projects, accounts, or becoming a contributor?
      We respond quickly and handle all inquiries personally.
    </p>
  </section>

  <!-- CONTACT AREA -->
  <section class="contact-wrap">

    <!-- FORM CARD -->
    <div class="card" id="formCard" style="
      border:1px solid rgba(120,203,255,.18);
      box-shadow:0 35px 90px rgba(0,0,0,.45);
    ">

      <form onsubmit="handleContactSubmit(event)">

        <label>Your Name</label>
        <input type="text" id="cName" placeholder="Full Name" required>

        <label>Your Email</label>
        <input type="email" id="cEmail" placeholder="Email" required>

        <label>I am a...</label>
        <select id="cType" required>
          <option value="">Select One</option>
          <option value="Prospective Client">Prospective Client</option>
          <option value="Worker Support">Worker Support</option>
          <option value="Existing Client">Existing Client</option>
          <option value="Other">Other</option>
        </select>

        <label>Message</label>
        <textarea id="cMessage" rows="6" placeholder="How can we help?" required></textarea>

        <button class="primary full" type="submit" style="
          margin-top:16px;
          box-shadow:0 20px 50px rgba(120,200,255,.18);
        ">
          Send Message
        </button>

      </form>

    </div>

    <!-- SUCCESS CARD -->
    <div class="card" id="successCard" style="display:none; text-align:center;">

      <div style="font-size:3rem;margin-bottom:12px;">✨</div>

      <h2 style="letter-spacing:-1px;">Message Sent</h2>

      <p style="color:#9ea8bc; margin-top:10px; line-height:1.7;">
        Thanks for reaching out — our team will get back to you soon.
      </p>

      <a class="back" href="index.html">← Back to Home</a>

    </div>

  </section>

</main>

<!-- SCRIPT -->
<script src="script.js"></script>

<script>
function handleContactSubmit(event){
    event.preventDefault();

    submitContactMessage({
        name: document.getElementById("cName").value.trim(),
        email: document.getElementById("cEmail").value.trim(),
        type: document.getElementById("cType").value,
        message: document.getElementById("cMessage").value.trim()
    });

    document.getElementById("formCard").style.display = "none";
    document.getElementById("successCard").style.display = "block";
}

/* NAVBAR BLUR EFFECT */
const navbar = document.getElementById("navbar");

window.addEventListener("scroll", () => {
  navbar.style.background =
    window.scrollY > 20
      ? "rgba(6,10,18,.88)"
      : "rgba(6,10,18,.72)";
});

/* PARTICLES (more premium density than other pages) */
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

function resize(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();

let particles = [];

for(let i=0;i<85;i++){   // slightly more than other pages
  particles.push({
    x: Math.random()*window.innerWidth,
    y: Math.random()*window.innerHeight,
    r: Math.random()*1.7,
    dx: (Math.random()-0.5)*0.38,
    dy: (Math.random()-0.5)*0.38
  });
}

function animate(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  particles.forEach(p=>{
    p.x += p.dx;
    p.y += p.dy;

    if(p.x < 0 || p.x > canvas.width) p.dx *= -1;
    if(p.y < 0 || p.y > canvas.height) p.dy *= -1;

    ctx.beginPath();
    ctx.fillStyle = "rgba(120,200,255,0.28)";
    ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fill();
  });

  requestAnimationFrame(animate);
}
animate();

window.addEventListener("resize", resize);
</script>

<!-- ORBS (STRONGER PREMIUM FEEL ONLY FOR THIS PAGE) -->
<style>
.orb-layer{
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:0;
  overflow:hidden;
}

.orb{
  position:absolute;
  border-radius:50%;
  filter:blur(120px);
  opacity:.30;
  animation:float 18s ease-in-out infinite;
}

.orb1{
  width:560px;height:560px;
  background:radial-gradient(circle,#7d79ff,transparent 60%);
  top:5%; left:3%;
}

.orb2{
  width:650px;height:650px;
  background:radial-gradient(circle,#45d7ff,transparent 60%);
  bottom:5%; right:6%;
  animation-duration:22s;
}

.orb3{
  width:480px;height:480px;
  background:radial-gradient(circle,rgba(255,255,255,.22),transparent 60%);
  top:45%; left:58%;
  animation-duration:26s;
}

@keyframes float{
  0%,100%{ transform:translate(0,0); }
  50%{ transform:translate(50px,-70px); }
}

/* IMPORTANT LAYER FIX */
canvas{
  position:fixed;
  inset:0;
  z-index:0;
  pointer-events:none;
}

.navbar, .container{
  position:relative;
  z-index:2;
}

/* INPUT GLOW ENHANCEMENT (NO CSS FILE CHANGE) */
input:focus, textarea:focus, select:focus{
  box-shadow:0 0 0 2px rgba(120,200,255,.18);
}
</style>

</body>
</html>
