<body>

<div class="noise"></div>

<div class="login-container">

    <div class="login-box">

        <h1>Harmonia</h1>
        <h2>Admin Login</h2>

        <form onsubmit="adminLoginUser(event)">

            <input type="email" id="email" placeholder="Admin Email" required>

            <input type="password" id="password" placeholder="Password" required>

            <button type="submit" class="primary full">Login</button>

        </form>

        <p>This portal is restricted to authorized administrators only.</p>

        <a class="back" href="index.html">← Back to Home</a>

    </div>

</div>

<script src="script.js"></script>
<script>
// If already logged in as admin with a still-valid session, skip
// straight to the dashboard instead of asking to log in again.
(function restoreExistingSession() {
    const existing = getUser();
    if (!existing || !existing.token || existing.role !== "admin") return;

    verifySessionWithServer().then(valid => {
        if (valid) window.location.href = "admin-dashboard.html";
    });
})();
</script>
<script>
async function adminLoginUser(event) {
    event.preventDefault();

    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;

    if (isLockedOut(email)) {
        alert("Too many failed attempts. Please wait 5 minutes before trying again.");
        return;
    }

    try {
        const response = await fetch(WORKER_URL + "/api/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email, password })
        });

        let data;
        try {
            data = await response.json();
        } catch (e) {
            alert("Server returned an invalid response");
            return;
        }

        if (!response.ok) {
            recordFailedAttempt(email);
            alert(data?.error || "Login failed.");
            return;
        }

        if (!data?.user || data.user.role !== "admin") {
            // Correct password, but not an admin account - don't let them in here.
            recordFailedAttempt(email);
            alert("This account is not an administrator.");
            return;
        }

        clearLoginAttempts(email);
        saveUser(data.user, data.token);
        window.location.href = "admin-dashboard.html";

    } catch (err) {
        alert("Unable to connect to the server.");
        console.error(err);
    }
}
</script>
