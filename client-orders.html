<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Orders - Harmonia</title>

    <link rel="stylesheet" href="style.css">

    <style>
        .badge {
            padding: 3px 10px;
            border-radius: 999px;
            font-size: 0.75rem;
            font-weight: 600;
            display: inline-block;
        }

        .pending { background: rgba(255,193,7,.15); color: #ffcc66; }
        .approved { background: rgba(46,204,113,.15); color: #7dffb2; }
        .rejected { background: rgba(255,77,77,.15); color: #ff7a7a; }

        .details-row {
            display: none;
            background: rgba(255,255,255,.03);
        }

        .details-box {
            padding: 14px;
            font-size: 0.9rem;
            color: #cfd8e3;
            border-top: 1px solid rgba(255,255,255,.08);
        }

        .muted {
            color: #9dadc1;
        }

        .detail-btn {
            padding: 5px 10px;
            border: none;
            border-radius: 6px;
            background: #5b6cff;
            color: white;
            cursor: pointer;
            font-size: 0.8rem;
        }

        .detail-btn:disabled {
            opacity: .5;
            cursor: not-allowed;
        }

        .mini-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
            margin-top: 8px;
        }
    </style>
</head>

<body>

<div class="noise"></div>

<script src="script.js?v=2"></script>

<script>
protectPage("client");
</script>

<div class="dashboard">

    <!-- Sidebar -->
    <aside class="sidebar">

        <h2 class="logo">Harmonia</h2>

        <ul>
            <li><a href="client-dashboard.html">🏠 Dashboard</a></li>
            <li><a href="client-projects.html">📁 Projects</a></li>
            <li><a href="client-new-project.html">➕ New Project</a></li>
            <li class="active">📦 Orders</li>
            <li><a href="client-billing.html">💳 Billing</a></li>
            <li>💬 Support</li>
            <li>⚙ Settings</li>
            <li><a href="login.html" onclick="logout()">🚪 Logout</a></li>
        </ul>

    </aside>

    <!-- Main -->
    <main class="main">

        <header class="topbar">
            <h1>My Orders</h1>
            <div class="profile">Client</div>
        </header>

        <section class="recent">

            <h2>Order History</h2>

            <table>

                <thead>
                    <tr>
                        <th>Order ID</th>
                        <th>Project</th>
                        <th>Category</th>
                        <th>Status</th>
                        <th>Reviews</th>
                        <th>Action</th>
                    </tr>
                </thead>

                <tbody id="ordersTable">
                    <tr>
                        <td colspan="6" style="text-align:center;color:#9dadc1;padding:20px;">
                            Loading orders...
                        </td>
                    </tr>
                </tbody>

            </table>

        </section>

    </main>

</div>

<script>

// Orders now come from the real backend (D1) via the Worker API,
// not localStorage ("harmonia_orders" is the old/legacy local system —
// see project handoff notes on duplicate project-tracking systems).

const user = getUser();
const table = document.getElementById("ordersTable");

let allOrders = [];

async function fetchMyOrders(email) {
    const response = await authFetch(WORKER_URL + "/api/orders?email=" + encodeURIComponent(email));
    const data = await response.json();
    if (!response.ok) throw new Error(data.error || "Failed to load orders");
    return data.orders || [];
}

function getStatusClass(status) {

    if (status === "Paid") return "approved";

    if (status === "Assigned") return "approved";

    if (status === "Completed") return "approved";

    if (status === "Cancelled") return "rejected";

    return "pending";

}

// An "Awaiting Payment" order older than 10 minutes is treated as
// expired/cancelled in the UI, even though the row itself still says
// "Awaiting Payment" in the database until the user actually deletes it.
const PAYMENT_WINDOW_MS = 10 * 60 * 1000;

function isPaymentExpired(order) {
    if (order.status !== "Awaiting Payment") return false;
    const created = new Date(order.created_at).getTime();
    if (isNaN(created)) return false;
    return (Date.now() - created) > PAYMENT_WINDOW_MS;
}

function displayStatus(order) {
    return isPaymentExpired(order) ? "Cancelled" : (order.status || "Pending");
}

function getOrderDate(order) {
    // D1 schema has submitted_at and created_at, but no updatedAt column.
    return order.submitted_at || order.created_at || null;
}

function formatDate(value) {
    if (!value) return "N/A";
    const d = new Date(value);
    return isNaN(d.getTime()) ? "N/A" : d.toLocaleString();
}

function renderOrders() {

    table.innerHTML = "";

    if (!allOrders.length) {

        table.innerHTML = `
            <tr>
                <td colspan="6" style="text-align:center;color:#9dadc1;padding:20px;">
                    No orders found yet.
                </td>
            </tr>
        `;

        return;
    }

    allOrders.forEach((order, index) => {

        const rowId = "row_" + index;
        const chat = order.supportChat || [];
        const expired = isPaymentExpired(order);
        const awaitingPayment = order.status === "Awaiting Payment";

        let extraActionBtn = "";
        if (awaitingPayment && !expired) {
            extraActionBtn = `<button class="detail-btn" onclick="resumePayment('${escapeHTML(order.order_id)}','${order.total_price}','${escapeHTML(order.created_at)}')">Resume Payment</button>`;
        } else if (expired) {
            extraActionBtn = `<button class="detail-btn" onclick="deleteOrder('${escapeHTML(order.order_id)}')">Delete</button>`;
        }

        table.innerHTML += `
            <tr>
                <td>${escapeHTML(order.order_id)}</td>
                <td>${escapeHTML(order.project_name)}</td>
                <td>${escapeHTML(order.category)}</td>
                <td>
                    <span class="badge ${getStatusClass(displayStatus(order))}">
                        ${escapeHTML(displayStatus(order))}
                    </span>
                </td>
                <td>${order.reviews}</td>
                <td>
                    <button class="detail-btn" onclick="toggleDetails('${rowId}')">
                        Details
                    </button>
                    ${extraActionBtn}
                </td>
            </tr>

            <tr id="${rowId}" class="details-row">
                <td colspan="6">

                    <div class="details-box">

                        <strong>Order Timeline</strong>

                        <div class="mini-grid">
                            <div>Created: ${formatDate(getOrderDate(order))}</div>
                            <div>Updated: N/A</div>
                            <div>Payment Method: Not set</div>
                            <div>Payment Proof: ${order.payment_proof ? "Submitted" : "Not submitted"}</div>
                        </div>

                        <div style="margin-top:10px;">
                            <strong>Admin Status:</strong>
                            ${escapeHTML(order.status || "Pending")}
                        </div>

                        <div style="margin-top:6px;">
                            <strong>Total:</strong>
                            $${order.total_price || 0}
                        </div>

                        <hr style="margin:18px 0;border-color:rgba(255,255,255,.08);">

                        <h3 style="margin-bottom:12px;">
                            💬 Conversation
                        </h3>

                        <div style="
                            background:rgba(255,255,255,.03);
                            border:1px solid rgba(255,255,255,.08);
                            border-radius:10px;
                            padding:12px;
                            max-height:250px;
                            overflow-y:auto;
                            margin-bottom:16px;
                        ">

                            ${
                                chat.length
                                ? chat.map(msg => `
                                    <div style="
                                        margin-bottom:12px;
                                        padding:10px;
                                        border-radius:8px;
                                        background:${msg.sender==="admin"
                                            ?"rgba(91,108,255,.18)"
                                            :"rgba(255,255,255,.05)"};
                                    ">

                                        <strong>
                                            ${msg.sender==="admin"
                                                ?"Administrator"
                                                :"You"}
                                        </strong>

                                        <div style="margin-top:6px;white-space:pre-wrap;">
                                            ${escapeHTML(msg.message)}
                                        </div>

                                        <small style="opacity:.6;">
                                            ${formatDate(msg.time)}
                                        </small>

                                    </div>
                                `).join("")
                                : `<div style="opacity:.6;">No conversation yet.</div>`
                            }

                        </div>

                        <button
                            class="detail-btn"
                            onclick="openSupport('${escapeHTML(order.order_id)}','${escapeHTML(order.project_name)}')">
                            💬 Contact Support
                        </button>

                    </div>

                </td>
            </tr>
        `;
    });
}

async function loadOrders() {

    try {
        allOrders = await fetchMyOrders(user.email);
    } catch (err) {
        table.innerHTML = `
            <tr>
                <td colspan="6" style="text-align:center;color:#ff8080;padding:20px;">
                    Could not load orders: ${escapeHTML(err.message)}
                </td>
            </tr>
        `;
        return;
    }

    /* NEWEST FIRST (premium feel) */
    allOrders.sort((a, b) => new Date(getOrderDate(b)) - new Date(getOrderDate(a)));

    renderOrders();
}

loadOrders();

/* TOGGLE DETAILS */
function toggleDetails(id) {
    const row = document.getElementById(id);
    if (!row) return;

    row.style.display = (row.style.display === "table-row") ? "none" : "table-row";
}

/* ==========================
   SUPPORT CHAT
   Sends via POST /api/orders/reply (client-facing), which appends
   { sender: "client", message, time } to the order's support_chat
   column in D1. The Worker verifies the order's client_email matches
   the email sent here before writing.
========================== */

let supportOrderId = "";
let supportProjectName = "";

function openSupport(orderId, projectName) {

    supportOrderId = orderId;
    supportProjectName = projectName;

    document.getElementById("supportInfo").innerHTML =
        "<strong>Order:</strong> " + orderId +
        "<br><strong>Project:</strong> " + projectName;

    document.getElementById("supportModal").style.display = "flex";
}

function closeSupport() {

    document.getElementById("supportModal").style.display = "none";
    document.getElementById("supportText").value = "";

}

async function sendSupport() {

    const message = document.getElementById("supportText").value.trim();

    if (!message) {
        alert("Please enter a message.");
        return;
    }

    try {
        const response = await authFetch(WORKER_URL + "/api/orders/reply", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                orderId: supportOrderId,
                email: user.email,
                message: message,
            }),
        });

        const data = await response.json();

        if (!response.ok) {
            throw new Error(data.error || "Failed to send message");
        }

        alert("Your message has been sent to the support team.");
        closeSupport();
        loadOrders();

    } catch (err) {
        alert("Could not send message: " + err.message);
    }

}

</script>

<!-- SUPPORT MODAL -->

<div id="supportModal"
style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:9999;justify-content:center;align-items:center;">

    <div style="background:#111827;border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:24px;width:460px;max-width:92%;">

        <h2 style="margin-top:0;">Contact Support</h2>

        <p id="supportInfo" style="color:#9dadc1;font-size:.9rem;"></p>

        <textarea
            id="supportText"
            placeholder="Example: I forgot to include my Google Maps listing link..."
            style="width:100%;height:140px;border-radius:8px;padding:12px;margin-top:10px;background:#1a2333;color:white;border:1px solid rgba(255,255,255,.08);resize:vertical;"></textarea>

        <div style="display:flex;justify-content:flex-end;gap:10px;margin-top:18px;">

            <button class="detail-btn" onclick="closeSupport()">
                Cancel
            </button>

            <button class="detail-btn" onclick="sendSupport()">
                Send Message
            </button>

        </div>

    </div>

</div>

</body>
</html>
