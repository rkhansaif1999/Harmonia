<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Projects - Harmonia</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="noise"></div>
<script src="script.js?v=2"></script>
<script>
    protectPage("client");
</script>
<div class="dashboard">
    <!-- Sidebar -->
    <aside class="sidebar">
        <h2 class="logo">Harmonia</h2>
        <ul>
            <li><a href="client-dashboard.html">🏠 Dashboard</a></li>
            <li class="active">📁 Projects</li>
            <li><a href="client-new-project.html">➕ New Project</a></li>
            <li><a href="client-orders.html">📦 Orders</a></li>
            <li><a href="client-billing.html">💳 Billing</a></li>
            <li>💬 Support</li>
            <li>⚙ Settings</li>
            <li><a href="login.html" onclick="logout()">🚪 Logout</a></li>
        </ul>
    </aside>
    <!-- Main -->
    <main class="main">
        <header class="topbar">
            <h1>My Projects</h1>
            <div class="profile">
                Client
            </div>
        </header>
        <section class="recent">
            <h2>My Submitted Projects</h2>
            <table>
                <thead>
                    <tr>
                        <th>Project</th>
                        <th>Category</th>
                        <th>Reviews</th>
                        <th>Status</th>
                        <th>Worker</th>
                    </tr>
                </thead>
                <tbody id="projectTable"></tbody>
            </table>
        </section>
    </main>
</div>
<script>
(async function () {
    const user = getUser();
    const table = document.getElementById("projectTable");

    table.innerHTML = `<tr><td colspan="5">Loading...</td></tr>`;

    try {
        const ordersRes = await authFetch(`${WORKER_URL}/api/orders?email=${encodeURIComponent(user.email)}`);
        const ordersData = await ordersRes.json();
        if (!ordersRes.ok) {
            table.innerHTML = `<tr><td colspan="5">Failed to load projects: ${escapeHTML(ordersData.error || "Unknown error")}</td></tr>`;
            return;
        }
        const myProjects = (ordersData.orders || []).filter(o => o.status !== "Awaiting Payment");
        if (myProjects.length === 0) {
            table.innerHTML = `<tr><td colspan="5">No projects submitted yet.</td></tr>`;
            return;
        }
        table.innerHTML = "";
        myProjects.forEach(project => {
            const workerName = project.assigned_to ? "Assigned" : "Not Assigned";
            table.innerHTML += `
                <tr>
                    <td>${escapeHTML(project.project_name)}</td>
                    <td>${escapeHTML(project.category)}</td>
                    <td>${project.reviews}</td>
                    <td>${statusBadge(project.status)}</td>
                    <td>${escapeHTML(workerName)}</td>
                </tr>
            `;
        });
    } catch (err) {
        table.innerHTML = `<tr><td colspan="5">Error loading projects: ${escapeHTML(err.message)}</td></tr>`;
    }
})();
</script>
</body>
</html>
