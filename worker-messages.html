<style>
    .wm-card { padding: 0; overflow: visible; }
    .wm-card:hover { transform: none; box-shadow: none; }
    .wm-card::before { display: none; }

    .wm-toolbar {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 12px 16px;
        border-bottom: 1px solid rgba(255,255,255,0.08);
        background: rgba(255,255,255,0.02);
        border-radius: 24px 24px 0 0;
    }
    .wm-toolbar input[type="checkbox"] {
        width: 17px;
        height: 17px;
        cursor: pointer;
        margin-right: 8px;
        accent-color: #587dff;
    }
    .wm-toolbar button {
        background: transparent;
        border: 1px solid rgba(255,255,255,.12);
        color: #e8ecf5;
        padding: 7px 11px;
        border-radius: 8px;
        cursor: pointer;
        font-size: 13px;
        line-height: 1;
    }
    .wm-toolbar button:hover { background: rgba(255,255,255,.07); }
    .wm-toolbar button.wm-danger:hover { background: rgba(192,57,43,.25); border-color: #c0392b; }
    .wm-selcount { color: #9dadc1; font-size: 13px; margin-left: 4px; }
    .wm-spacer { flex: 1; }
    .wm-compose-btn {
        background: #3a6df0 !important;
        border: none !important;
        color: #fff;
        font-weight: 600;
        padding: 9px 16px !important;
    }
    .wm-compose-btn:hover { background: #5081ff !important; }

    #threadList { max-height: 65vh; overflow-y: auto; }

    .wm-row {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 13px 16px;
        border-bottom: 1px solid rgba(255,255,255,0.05);
        cursor: pointer;
        transition: background .15s ease;
    }
    .wm-row:hover { background: rgba(255,255,255,0.045); }
    .wm-row input[type="checkbox"] {
        width: 16px;
        height: 16px;
        cursor: pointer;
        flex-shrink: 0;
        accent-color: #587dff;
    }
    .wm-star {
        flex-shrink: 0;
        cursor: pointer;
        font-size: 16px;
        color: rgba(255,255,255,.25);
        user-select: none;
    }
    .wm-star.active { color: #f5c518; }
    .wm-row-main { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 3px; }
    .wm-row-top { display: flex; justify-content: space-between; gap: 10px; }
    .wm-row-subject {
        color: #d7ddec;
        font-size: .92rem;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }
    .wm-row-company {
        color: #9dadc1;
        font-size: .8rem;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }
    .wm-row-time { color: #9dadc1; font-size: .78rem; flex-shrink: 0; white-space: nowrap; }
    .wm-row.unread .wm-row-subject,
    .wm-row.unread .wm-row-company { font-weight: 700; color: #fff; }
    .wm-row.unread::before {
        content: "";
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: #587dff;
        flex-shrink: 0;
    }
    .wm-row:not(.unread)::before {
        content: "";
        width: 7px;
        flex-shrink: 0;
    }
</style>

<body>

<div class="noise"></div>

<script src="script.js?v=3"></script>

<script>
    protectPage("worker");
</script>

<div class="dashboard">

    <!-- Sidebar -->
    <aside class="sidebar">
        <h2 class="logo"><img src="images/logo.png" alt="Harmonia" class="logo-img">Harmonia</h2>
        <ul>
            <li><a href="worker-dashboard.html">🏠 Dashboard</a></li>
            <li><a href="worker-tasks.html">✅ My Tasks</a></li>
            <li class="active">✉️ Messages</li>
            <li><a href="worker-earnings.html">💰 Earnings</a></li>
            <li><a href="worker-payments.html">🏦 Payments</a></li>
            <li><a href="login.html" onclick="logout()">🚪 Logout</a></li>
        </ul>
    </aside>

    <!-- Main -->
    <main class="main">
        <header class="topbar">
            <h1>Messages</h1>
            <div class="profile">Worker</div>
        </header>

        <section class="recent" id="noPermissionSection" style="display:none;">
            <div class="card">
                <h3 style="margin-top:0;">Email access not enabled</h3>
                <p>You don't currently have permission to message companies from Harmonia. Contact admin support if you believe you need this.</p>
            </div>
        </section>

        <section class="recent" id="messagesUI" style="display:none;">
            <div class="card wm-card">
                <div class="wm-toolbar">
                    <input type="checkbox" id="wmSelectAll" onchange="toggleSelectAllThreads(this.checked)" title="Select all">
                    <button onclick="handleBulkDelete()" class="wm-danger" title="Delete">🗑</button>
                    <button onclick="handleBulkMarkUnread()" title="Mark as unread">📩</button>
                    <button onclick="handleBulkMarkImportant()" title="Mark as important">⭐</button>
                    <span class="wm-selcount" id="wmSelCount"></span>
                    <div class="wm-spacer"></div>
                    <button class="wm-compose-btn" onclick="showNewThreadForm()">+ New Message</button>
                </div>
                <div id="threadList">
                    <p class="empty-state" style="padding:24px;">Loading...</p>
                </div>
            </div>
        </section>

        <!-- Compose popup -->
        <div id="newThreadOverlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(6px);z-index:9999;align-items:center;justify-content:center;">
            <div style="background:#0d1424;border:1px solid rgba(255,255,255,.1);border-radius:20px;padding:28px;max-width:520px;width:92%;box-shadow:0 30px 80px rgba(0,0,0,.5);">
                <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px;">
                    <h3 style="margin:0;color:#fff;">📧 New Message</h3>
                    <button onclick="closeNewThreadForm()" style="background:transparent;border:none;color:#9dadc1;font-size:1.4rem;cursor:pointer;">×</button>
                </div>
                <label>To (company email)</label>
                <input type="email" id="newThreadTo" placeholder="e.g. company@example.com" style="width:100%;box-sizing:border-box;margin-bottom:12px;">
                <label>Subject</label>
                <input type="text" id="newThreadSubject" placeholder="Subject" style="width:100%;box-sizing:border-box;margin-bottom:12px;">
                <label>Message</label>
                <textarea id="newThreadMessage" rows="5" placeholder="Type your message here..." style="width:100%;box-sizing:border-box;"></textarea>
                <div style="display:flex;align-items:center;gap:12px;margin-top:12px;">
                    <button class="primary" onclick="handleStartThread()">Send</button>
                    <span class="reply-status" id="newThreadStatus"></span>
                </div>
            </div>
        </div>

        <!-- Conversation popup -->
        <div id="threadOverlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(6px);z-index:9999;align-items:center;justify-content:center;">
            <div style="background:#0d1424;border:1px solid rgba(255,255,255,.1);border-radius:20px;padding:28px;max-width:720px;width:92%;height:80vh;display:flex;flex-direction:column;box-shadow:0 30px 80px rgba(0,0,0,.5);">
                <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px;">
                    <div>
                        <h3 id="threadOverlaySubject" style="margin:0;color:#fff;"></h3>
                        <p id="threadOverlayMeta" style="color:#9dadc1;font-size:.85rem;margin:4px 0 0 0;"></p>
                    </div>
                    <div style="display:flex;gap:10px;align-items:center;">
                        <button onclick="handleDeleteFromOverlay()" title="Delete conversation" style="background:transparent;border:1px solid rgba(255,255,255,.12);color:#e8ecf5;border-radius:8px;padding:6px 10px;cursor:pointer;">🗑</button>
                        <button onclick="closeThreadOverlay()" style="background:transparent;border:none;color:#9dadc1;font-size:1.4rem;cursor:pointer;">×</button>
                    </div>
                </div>
                <div id="threadOverlayMessages" style="overflow-y:auto;overflow-x:hidden;flex:1;margin:16px 0;display:flex;flex-direction:column;gap:10px;"></div>
                <div style="display:flex;gap:10px;align-items:flex-end;">
                    <textarea id="threadOverlayReplyInput" placeholder="Type a reply... (Enter to send, Shift+Enter or Ctrl+Enter for a new line)" rows="2" style="flex:1;box-sizing:border-box;resize:vertical;max-height:200px;overflow-y:auto;font-family:inherit;"></textarea>
                    <button class="primary" onclick="handleReplyThread()">Send</button>
                </div>
            </div>
        </div>

        <!-- Themed alert / confirm popup (replaces native browser alert/confirm) -->
        <div id="alertOverlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(6px);z-index:10000;align-items:center;justify-content:center;">
            <div style="background:#0d1424;border:1px solid rgba(255,255,255,.1);border-radius:20px;padding:30px;max-width:420px;width:90%;box-shadow:0 30px 80px rgba(0,0,0,.5);text-align:center;">
                <div id="alertIcon" style="width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 16px auto;font-size:1.4rem;background:rgba(88,125,255,.15);color:#7d9bff;">ℹ️</div>
                <h3 id="alertTitle" style="margin:0 0 10px 0;color:#fff;font-size:1.15rem;"></h3>
                <p id="alertMessage" style="color:#9dadc1;line-height:1.6;margin:0 0 24px 0;"></p>
                <div style="display:flex;gap:12px;justify-content:center;">
                    <button id="alertCancelBtn" style="display:none;padding:10px 22px;border-radius:10px;border:1px solid rgba(255,255,255,.15);background:transparent;color:#fff;cursor:pointer;">Cancel</button>
                    <button id="alertOkBtn" style="padding:10px 22px;border-radius:10px;border:none;background:linear-gradient(135deg,#7d79ff,#45d7ff);color:#0d1424;cursor:pointer;font-weight:700;">OK</button>
                </div>
            </div>
        </div>

    </main>
</div>

<script>

let allThreads = [];
let activeThreadId = null;
let selectedThreadIds = new Set();

// ------------------------------------------------------------
// Themed alert / confirm (replaces native browser alert()/confirm()
// popups, which look out of place against the rest of the UI).
// showAlert() resolves once the user dismisses it.
// showConfirm() resolves true/false depending on OK vs Cancel.
// ------------------------------------------------------------

function showAlert(message, opts) {
    opts = opts || {};
    return new Promise((resolve) => {
        const overlay = document.getElementById("alertOverlay");
        const icon = document.getElementById("alertIcon");
        const title = document.getElementById("alertTitle");
        const isError = opts.type === "error";

        title.textContent = opts.title || (isError ? "Something went wrong" : "Notice");
        document.getElementById("alertMessage").textContent = message;
        icon.textContent = isError ? "⚠️" : "ℹ️";
        icon.style.background = isError ? "rgba(224,90,90,.15)" : "rgba(88,125,255,.15)";
        icon.style.color = isError ? "#e05a5a" : "#7d9bff";

        document.getElementById("alertCancelBtn").style.display = "none";
        overlay.style.display = "flex";

        const okBtn = document.getElementById("alertOkBtn");
        function onOk() {
            overlay.style.display = "none";
            okBtn.removeEventListener("click", onOk);
            resolve(true);
        }
        okBtn.addEventListener("click", onOk);
    });
}

function showConfirm(message, opts) {
    opts = opts || {};
    return new Promise((resolve) => {
        const overlay = document.getElementById("alertOverlay");
        const icon = document.getElementById("alertIcon");
        document.getElementById("alertTitle").textContent = opts.title || "Please confirm";
        document.getElementById("alertMessage").textContent = message;
        icon.textContent = "❓";
        icon.style.background = "rgba(88,125,255,.15)";
        icon.style.color = "#7d9bff";

        const cancelBtn = document.getElementById("alertCancelBtn");
        const okBtn = document.getElementById("alertOkBtn");
        cancelBtn.style.display = "inline-block";
        overlay.style.display = "flex";

        function cleanup(result) {
            overlay.style.display = "none";
            okBtn.removeEventListener("click", onOk);
            cancelBtn.removeEventListener("click", onCancel);
            resolve(result);
        }
        function onOk() { cleanup(true); }
        function onCancel() { cleanup(false); }

        okBtn.addEventListener("click", onOk);
        cancelBtn.addEventListener("click", onCancel);
    });
}


// ------------------------------------------------------------
// Per-thread "unread" / "important" flags. The backend doesn't track
// these (no schema for it), so they're kept client-side, scoped to
// this worker's account, and persist across visits on this device.
// ------------------------------------------------------------

function threadFlagsKey() {
    const user = getUser();
    return "wmThreadFlags_" + (user ? user.id : "anon");
}
function loadThreadFlags() {
    try { return JSON.parse(localStorage.getItem(threadFlagsKey()) || "{}"); }
    catch { return {}; }
}
function saveThreadFlags(flags) {
    localStorage.setItem(threadFlagsKey(), JSON.stringify(flags));
}
function getThreadFlag(threadId) {
    const flags = loadThreadFlags();
    return flags[threadId] || { unread: true, important: false };
}
function setThreadFlag(threadId, patch) {
    const flags = loadThreadFlags();
    flags[threadId] = Object.assign(getThreadFlag(threadId), patch);
    saveThreadFlags(flags);
}

async function initMessagesPage() {
    const user = getUser();
    if (user && user.canSendEmail) {
        document.getElementById("messagesUI").style.display = "block";
        loadThreadList();
    } else {
        document.getElementById("noPermissionSection").style.display = "block";
    }
}

async function loadThreadList() {
    const list = document.getElementById("threadList");
    try {
        const data = await fetchWorkerThreads();
        allThreads = data.threads || [];
        selectedThreadIds.clear();
        renderThreadList();
        updateBulkUI();
    } catch (err) {
        console.error(err);
        list.innerHTML = `<p class="empty-state" style="padding:24px;">Failed to load.</p>`;
    }
}

function renderThreadList() {
    const list = document.getElementById("threadList");
    if (allThreads.length === 0) {
        list.innerHTML = `<p class="empty-state" style="padding:24px;">No conversations yet.</p>`;
        return;
    }
    const sorted = allThreads.slice().sort((a, b) => new Date(b.last_message_at) - new Date(a.last_message_at));
    list.innerHTML = "";
    sorted.forEach(t => {
        const flag = getThreadFlag(t.id);
        const row = document.createElement("div");
        row.className = "wm-row" + (flag.unread ? " unread" : "");
        row.innerHTML = `
            <input type="checkbox" class="wm-row-check" ${selectedThreadIds.has(t.id) ? "checked" : ""}>
            <span class="wm-star ${flag.important ? "active" : ""}">★</span>
            <div class="wm-row-main">
                <div class="wm-row-top">
                    <span class="wm-row-subject">${escapeHTML(t.subject)}</span>
                    <span class="wm-row-time">${new Date(t.last_message_at).toLocaleDateString()}</span>
                </div>
                <span class="wm-row-company">${escapeHTML(t.company_email)}</span>
            </div>
        `;
        row.querySelector(".wm-row-check").addEventListener("click", (e) => e.stopPropagation());
        row.querySelector(".wm-row-check").addEventListener("change", (e) => onThreadCheckChange(t.id, e.target.checked));
        row.querySelector(".wm-star").addEventListener("click", (e) => { e.stopPropagation(); toggleImportant(t.id); });
        row.querySelector(".wm-row-main").addEventListener("click", () => openThreadOverlay(t.id));
        list.appendChild(row);
    });
}

function onThreadCheckChange(id, checked) {
    if (checked) selectedThreadIds.add(id); else selectedThreadIds.delete(id);
    updateBulkUI();
}

function toggleSelectAllThreads(checked) {
    selectedThreadIds.clear();
    if (checked) allThreads.forEach(t => selectedThreadIds.add(t.id));
    renderThreadList();
    updateBulkUI();
}

function updateBulkUI() {
    const count = selectedThreadIds.size;
    document.getElementById("wmSelCount").textContent = count > 0 ? `${count} selected` : "";
    const selectAll = document.getElementById("wmSelectAll");
    selectAll.checked = allThreads.length > 0 && count === allThreads.length;
    selectAll.indeterminate = count > 0 && count < allThreads.length;
}

function toggleImportant(id) {
    const flag = getThreadFlag(id);
    setThreadFlag(id, { important: !flag.important });
    renderThreadList();
}

async function handleBulkDelete() {
    if (selectedThreadIds.size === 0) { await showAlert("Select at least one conversation first."); return; }
    if (!(await showConfirm(`Permanently delete ${selectedThreadIds.size} conversation(s)? This cannot be undone.`))) return;

    const ids = Array.from(selectedThreadIds);
    for (const id of ids) {
        await deleteWorkerThread(id);
    }
    if (activeThreadId && ids.includes(activeThreadId)) closeThreadOverlay();
    await loadThreadList();
}

async function handleBulkMarkUnread() {
    if (selectedThreadIds.size === 0) { await showAlert("Select at least one conversation first."); return; }
    selectedThreadIds.forEach(id => setThreadFlag(id, { unread: true }));
    renderThreadList();
}

async function handleBulkMarkImportant() {
    if (selectedThreadIds.size === 0) { await showAlert("Select at least one conversation first."); return; }
    selectedThreadIds.forEach(id => setThreadFlag(id, { important: true }));
    renderThreadList();
}

// ------------------------------------------------------------
// Compose popup
// ------------------------------------------------------------

function showNewThreadForm() {
    document.getElementById("newThreadTo").value = "";
    document.getElementById("newThreadSubject").value = "";
    document.getElementById("newThreadMessage").value = "";
    document.getElementById("newThreadStatus").textContent = "";
    document.getElementById("newThreadOverlay").style.display = "flex";
}

function closeNewThreadForm() {
    document.getElementById("newThreadOverlay").style.display = "none";
}

async function handleStartThread() {
    const to = document.getElementById("newThreadTo").value.trim();
    const subject = document.getElementById("newThreadSubject").value.trim();
    const message = document.getElementById("newThreadMessage").value.trim();
    const statusEl = document.getElementById("newThreadStatus");

    if (!to || !subject || !message) {
        statusEl.textContent = "Please fill in all fields.";
        statusEl.style.color = "#c0392b";
        return;
    }

    statusEl.textContent = "Sending...";
    statusEl.style.color = "#888";

    const result = await startWorkerThread(to, subject, message);

    if (result.error) {
        statusEl.textContent = "Failed: " + result.error;
        statusEl.style.color = "#c0392b";
        return;
    }

    closeNewThreadForm();
    await loadThreadList();
    openThreadOverlay(result.threadId);
}

// ------------------------------------------------------------
// Conversation popup (Facebook-chat style bubbles)
// ------------------------------------------------------------

async function openThreadOverlay(threadId) {
    activeThreadId = threadId;
    setThreadFlag(threadId, { unread: false });

    const data = await fetchWorkerThreadDetail(threadId);
    if (!data.thread) { await showAlert(data.error || "Failed to load conversation.", { type: "error" }); return; }

    document.getElementById("threadOverlaySubject").textContent = data.thread.subject;
    document.getElementById("threadOverlayMeta").textContent = `To: ${data.thread.company_email}`;

    const box = document.getElementById("threadOverlayMessages");
    box.innerHTML = "";
    data.messages.forEach(m => {
        const label = m.sender === "worker" ? "You" : m.sender === "admin" ? "Admin" : data.thread.company_email;
        const align = m.sender === "company" ? "flex-start" : "flex-end";
        const bg = m.sender === "company" ? "rgba(255,255,255,.06)" : "#587dff22";
        box.innerHTML += `
            <div style="align-self:${align};max-width:80%;min-width:0;background:${bg};padding:10px 14px;border-radius:12px;box-sizing:border-box;">
                <div style="font-size:.75rem;color:#9dadc1;margin-bottom:4px;">${escapeHTML(label)} • ${new Date(m.created_at).toLocaleString()}</div>
                <div style="color:#fff;white-space:pre-wrap;word-break:break-word;overflow-wrap:anywhere;">${escapeHTML(m.message)}</div>
            </div>
        `;
    });
    box.scrollTop = box.scrollHeight;

    const replyInput = document.getElementById("threadOverlayReplyInput");
    replyInput.value = "";
    replyInput.style.height = "auto";

    document.getElementById("threadOverlay").style.display = "flex";
    renderThreadList();
}

function closeThreadOverlay() {
    document.getElementById("threadOverlay").style.display = "none";
    activeThreadId = null;
}

async function handleDeleteFromOverlay() {
    if (!activeThreadId) return;
    if (!(await showConfirm("Permanently delete this conversation? This cannot be undone."))) return;

    const result = await deleteWorkerThread(activeThreadId);
    if (result.error) { await showAlert(result.error, { type: "error" }); return; }

    closeThreadOverlay();
    await loadThreadList();
}

async function handleReplyThread() {
    const input = document.getElementById("threadOverlayReplyInput");
    const message = input.value.trim();
    if (!message || !activeThreadId) return;

    const result = await replyWorkerThread(activeThreadId, message);
    if (result.error) { await showAlert(result.error, { type: "error" }); return; }

    openThreadOverlay(activeThreadId);
    loadThreadList();
}

// Enter sends the reply; Shift+Enter or Ctrl+Enter inserts a new line
// (same Facebook-chat behavior as admin-messages.html). The textarea
// also grows with content up to its max-height.
(function setupReplyTextarea() {
    const el = document.getElementById("threadOverlayReplyInput");
    el.addEventListener("input", () => {
        el.style.height = "auto";
        el.style.height = el.scrollHeight + "px";
    });
    el.addEventListener("keydown", (e) => {
        if (e.key === "Enter" && !e.shiftKey && !e.ctrlKey) {
            e.preventDefault();
            handleReplyThread();
        }
        // Shift+Enter / Ctrl+Enter fall through to the textarea's default
        // behavior, which inserts a newline.
    });
})();

initMessagesPage();
</script>
