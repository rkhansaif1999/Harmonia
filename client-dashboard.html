<div class="dashboard">
    <!-- Sidebar -->

            <li class="active">🏠 Dashboard</li>

            <li><a href="client-orders.html">📦 Orders</a></li>

            <li>⚙ Settings</li>
            <li><a href="login.html" onclick="logout()">🚪 Logout</a></li>
        </ul>
    </aside>
    <!-- Main -->
    <main class="main">
        <header class="topbar">
            <h1>Welcome Back 👋</h1>
            <div class="profile">
                Client
            </div>
        </header>
        <section class="cards">
            <div class="dashboard-card">
                <h3>Projects</h3>
                <h2 id="totalProjects">0</h2>
            </div>
            <div class="dashboard-card">
                <h3>Completed</h3>
                <h2 id="completedProjects">0</h2>
            </div>
            <div class="dashboard-card">
                <h3>Pending Projects</h3>
                <h2 id="pendingProjects">0</h2>
            </div>
            <div class="dashboard-card">
                <h3>Total Spent</h3>
                <h2 id="totalSpent">$0.00</h2>
            </div>
        </section>
        <section class="recent">
            <h2>Recent Projects</h2>
            <table>
                <thead>
                    <tr>
                        <th>Project</th>
                        <th>Category</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="recentProjects">
                    <tr><td colspan="3" style="opacity:.6;">Loading projects...</td></tr>
                </tbody>
            </table>
        </section>
    </main>
</div>
<script>

// Orders now come from the real backend (D1) via the Worker API,
// not localStorage.

const user = getUser();
const table = document.getElementById("recentProjects");

async function fetchMyOrders(email) {
    const response = await authFetch(WORKER_URL + "/api/orders?email=" + encodeURIComponent(email));
    const data = await response.json();
    if (!response.ok) throw new Error(data.error || "Failed to load orders");
    return data.orders || [];
}

async function renderDashboard() {

    let orders;
    try {
        orders = await fetchMyOrders(user.email);
    } catch (err) {
        table.innerHTML = `<tr><td colspan="3" style="color:#ff8080;">Could not load projects: ${escapeHTML(err.message)}</td></tr>`;
        return;
    }

    let completed = 0;
    let pending = 0;
    let totalSpent = 0;

    document.getElementById("totalProjects").textContent = orders.length;

    orders.forEach(order => {
        if (order.status === "Completed") {
            completed++;
            totalSpent += order.total_price || 0;
        }
        if (order.status === "Awaiting Payment" || order.status === "Under Review") {
            pending++;
        }
    });

    document.getElementById("completedProjects").textContent = completed;
    document.getElementById("pendingProjects").textContent = pending;
    document.getElementById("totalSpent").textContent = "$" + totalSpent.toFixed(2);

    table.innerHTML = "";

    if (orders.length === 0) {
        table.innerHTML = `<tr><td colspan="3" class="empty-state">No projects yet</td></tr>`;
    }

    orders.slice(0, 5).forEach(order => {
        table.innerHTML += `
            <tr>
                <td>${escapeHTML(order.project_name)}</td>
                <td>${escapeHTML(order.category)}</td>
                <td>${statusBadge(order.status)}</td>
            </tr>
        `;
    });
}

renderDashboard();

</script>
