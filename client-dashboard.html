<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Client Dashboard - Harmonia</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="noise"></div>

<script src="script.js"></script>

<script>
    protectPage("client");
</script>

<div class="dashboard">

    <!-- Sidebar -->
    <aside class="sidebar">

        <h2 class="logo">Harmonia</h2>

        <ul>
            <li class="active">🏠 Dashboard</li>
            <li><a href="client-projects.html">📁 Projects</a></li>
            <li><a href="client-new-project.html">➕ New Project</a></li>
            <li><a href="client-orders.html">📦 Orders</a></li>
            <li><a href="client-billing.html">💳 Billing</a></li>
            <li>💬 Support</li>
            <li>⚙ Settings</li>
            <li><a href="login.html" onclick="logout()">🚪 Logout</a></li>
        </ul>

    </aside>

    <!-- Main -->
    <main class="main">

        <header class="topbar">

            <h1>Welcome Back 👋</h1>

            <div class="profile">
                Client
            </div>

        </header>

        <section class="cards">

            <div class="dashboard-card">
                <h3>Projects</h3>
                <h2 id="totalProjects">0</h2>
            </div>

            <div class="dashboard-card">
                <h3>Completed</h3>
                <h2 id="completedProjects">0</h2>
            </div>

            <div class="dashboard-card">
                <h3>Pending Projects</h3>
                <h2 id="pendingProjects">0</h2>
            </div>

            <div class="dashboard-card">
                <h3>Total Spent</h3>
                <h2 id="totalSpent">$0.00</h2>
            </div>

        </section>

        <section class="recent">

            <h2>Recent Projects</h2>

            <table>

                <thead>
                    <tr>
                        <th>Project</th>
                        <th>Category</th>
                        <th>Status</th>
                    </tr>
                </thead>

                <tbody id="recentProjects">

                </tbody>

            </table>

        </section>

    </main>

</div>

<script>

const user = getUser();
const projects = getProjects().filter(p => p.clientId == user.id);

let completed = 0;
let pending = 0;
let totalSpent = 0;

document.getElementById("totalProjects").textContent = projects.length;

projects.forEach(project => {

    if(project.status === "Completed"){
        completed++;
        totalSpent += project.totalCost || 0;
    }

    if(project.status === "Pending"){
        pending++;
    }

});

document.getElementById("completedProjects").textContent = completed;
document.getElementById("pendingProjects").textContent = pending;
document.getElementById("totalSpent").textContent = "$" + totalSpent.toFixed(2);

const table = document.getElementById("recentProjects");

projects.slice(-5).reverse().forEach(project => {

    table.innerHTML += `
        <tr>
            <td>${escapeHTML(project.projectName)}</td>
            <td>${escapeHTML(project.category)}</td>
            <td>${statusBadge(project.status)}</td>
        </tr>
    `;

});

</script>

</body>

</html>
