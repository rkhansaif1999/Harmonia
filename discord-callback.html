<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Linking Discord...</title>
    <script src="script.js?v=20260721"></script>
    <style>body{font-family:sans-serif;text-align:center;padding:50px;background:#0f172a;color:#fff;}</style>
</head>
<body>
    <h2>Linking your Discord account...</h2>
    <p id="statusMsg">Please wait.</p>
    <script>
        (async () => {
            const urlParams = new URLSearchParams(window.location.search);
            const code = urlParams.get('code');
            const statusMsg = document.getElementById('statusMsg');
            
            if (code) {
                try {
                    const res = await authFetch(WORKER_URL + "/api/discord/link", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ code: code })
                    });
                    
                    if (res.ok) {
                        // Check user role to redirect to the correct dashboard
                        const user = getUser();
                        if (user && user.role === 'admin') {
                            window.location.href = "/admin-dashboard.html#settings";
                        } else {
                            window.location.href = "/worker-dashboard.html#settings";
                        }
                    } else {
                        const errorData = await res.json().catch(() => ({}));
                        console.error("Backend Error Details:", errorData);
                        statusMsg.innerHTML = `<strong style="color:#ef4444;">Failed to link Discord.</strong><br><br>Server says: ${errorData.error || 'Unknown error'}<br><br>Please go back to the dashboard and try again.`;
                    }
                } catch (err) {
                    statusMsg.innerHTML = `<strong style="color:#ef4444;">Error linking Discord.</strong><br>${err.message}`;
                }
            } else {
                window.location.href = "/worker-dashboard.html";
            }
        })();
    </script>
</body>
</html>
