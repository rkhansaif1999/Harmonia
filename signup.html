  <style>
  /* ===============================
     PREMIUM BACKGROUND SYSTEM
  =============================== */

  .orb{
    position:fixed;
    border-radius:50%;
    filter:blur(90px);
    opacity:.35;
    animation: float 16s ease-in-out infinite;
    z-index:-2;
  }

  .orb1{
    width:520px;height:520px;
    background:radial-gradient(circle,#7d79ff,transparent 60%);
    top:10%; left:5%;
  }

  .orb2{
    width:650px;height:650px;
    background:radial-gradient(circle,#45d7ff,transparent 60%);
    bottom:5%; right:10%;
    animation-duration:20s;
  }

  .orb3{
    width:420px;height:420px;
    background:radial-gradient(circle,rgba(255,255,255,.2),transparent 60%);
    top:45%; left:50%;
    animation-duration:24s;
  }

  @keyframes float{
    0%,100%{transform:translate(0,0);}
    50%{transform:translate(40px,-60px);}
  }

  canvas{
    position:fixed;
    inset:0;
    z-index:-1;
    pointer-events:none;
  }

  /* ===============================
     AUTH BOX PREMIUM UPGRADE
  =============================== */

  .auth-box{
    position:relative;
    overflow:hidden;
    border-radius:26px;
    background:rgba(255,255,255,.03);
    border:1px solid rgba(255,255,255,.08);
    backdrop-filter:blur(32px);
    box-shadow:0 35px 100px rgba(0,0,0,.55);
    padding:44px 38px;
  }

  .auth-box::before{
    content:"";
    position:absolute;
    top:-120px;
    right:-120px;
    width:260px;
    height:260px;
    border-radius:50%;
    background:rgba(125,121,255,.18);
    filter:blur(70px);
  }

  .auth-box::after{
    content:"";
    position:absolute;
    bottom:-120px;
    left:-120px;
    width:260px;
    height:260px;
    border-radius:50%;
    background:rgba(69,215,255,.14);
    filter:blur(80px);
  }

  .auth-box h2{
    font-size:1.8rem;
    font-weight:800;
    letter-spacing:-1px;
    background:linear-gradient(135deg,#ffffff,#a8b6ff);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
  }

  input, select{
    width:100%;
    padding:15px 16px;
    margin:8px 0;
    border-radius:12px;
    border:1px solid rgba(255,255,255,.08);
    background:rgba(255,255,255,.03);
    color:white;
    outline:none;
    transition:.25s;
  }

  select{
    appearance:none;
    -webkit-appearance:none;
    -moz-appearance:none;
    background-color:#141a24;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='14' height='9' viewBox='0 0 14 9'><path d='M1 1L7 7L13 1' stroke='%2378cbff' stroke-width='1.8' fill='none' stroke-linecap='round' stroke-linejoin='round'/></svg>");
    background-repeat:no-repeat;
    background-position:right 16px center;
    padding-right:42px;
    cursor:pointer;
    color-scheme:dark;
  }

  select:hover{
    border-color:rgba(125,121,255,.35);
  }

  select option{
    background:#141a24;
    color:#e9edf3;
    padding:10px;
  }

  select option:checked,
  select option:hover{
    background:#232c3d;
  }

  select:invalid{
    color:#9dadc1;
  }

  select option[value=""]{
    color:#7f8b9b;
  }

  input:focus, select:focus{
    transform:translateY(-2px);
    border-color:rgba(125,121,255,.5);
    box-shadow:0 10px 30px rgba(125,121,255,.12);
  }

  button.primary{
    width:100%;
    margin-top:12px;
  }

  button.primary:disabled{
    opacity:.6;
    cursor:not-allowed;
  }

  .auth-link{
    text-align:center;
    margin-top:18px;
    color:#9dadc1;
  }

  .auth-link a{
    color:#78cbff;
    font-weight:600;
  }

  .back{
    display:block;
    text-align:center;
    margin-top:16px;
    color:#7f8b9b;
  }

  .back:hover{
    color:#b7c4d6;
  }

  .form-msg{
    min-height:20px;
    font-size:.9rem;
    margin-top:6px;
    text-align:center;
  }

  .form-msg.error{ color:#ff8080; }
  .form-msg.success{ color:#7fe0a0; }

  .success-icon{
    width:64px;
    height:64px;
    margin:6px auto 18px;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:30px;
    font-weight:800;
    color:#0c1420;
    background:linear-gradient(135deg,#7fe0a0,#45d7ff);
    box-shadow:0 12px 30px rgba(69,215,255,.35);
  }

<body>

<div class="noise"></div>

<!-- ORBS -->
<div style="position:fixed;inset:0;pointer-events:none;z-index:-2;">

  <div class="orb orb2"></div>
  <div class="orb orb3"></div>

<!-- PARTICLES -->
<canvas id="particles"></canvas>

<div class="auth-container">

  <div class="auth-box" id="signupBox">

    <form id="signupForm" onsubmit="signupUser(event)">

      <div class="logo" style="margin-bottom:24px;"><img src="images/logo.png" alt="Harmonia" class="logo-img">Harmonia</div>

      <h2>Create Account</h2>

      <input type="text" id="fullName" placeholder="Full Name" required>
      <input type="email" id="email" placeholder="Email" required>
      <div class="password-field">
<input type="password" id="password" placeholder="Password (min 8 characters)" minlength="8" required>
<button type="button" class="toggle-password" onclick="togglePasswordVisibility('password', this)" aria-label="Show password">
<svg class="icon-eye" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8Z"></path><circle cx="12" cy="12" r="3"></circle></svg>
<svg class="icon-eye-off" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.94 10.94 0 0 1 12 20c-7 0-11-8-11-8a21.77 21.77 0 0 1 5.06-6.06"></path><path d="M9.9 4.24A10.94 10.94 0 0 1 12 4c7 0 11 8 11 8a21.77 21.77 0 0 1-3.22 4.44"></path><path d="M14.12 14.12a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>
</button>
</div>

      <select id="role" required>
        <option value="">Select Account Type</option>
        <option value="worker">Worker</option>
      </select>

      <select id="country" required>
        <option value="">Select Country</option>
      </select>

      <button class="primary" type="submit" id="signupBtn">Create Account</button>

      <p class="form-msg" id="signupMsg"></p>

      <p class="auth-link">
        Already have an account? <a href="login.html">Login</a>
      </p>

      <a class="back" href="index.html">← Back to Home</a>

    </form>
  </div>

  <!-- VERIFY -->
  <div class="auth-box" id="verifyBox" style="display:none;">

    <form onsubmit="verifyCode(event)">

      <h2>Verify Your Email</h2>
      <p style="color:#9dadc1;margin-bottom:14px;">
        Enter the 6-digit code sent to your email.
      </p>

      <input type="text" id="verifyInput" placeholder="Enter 6-digit code" maxlength="6" required>

      <button class="primary" type="submit">Verify & Continue</button>

      <p class="form-msg" id="verifyMsg"></p>

      <p class="auth-link">
        Didn’t get code? <a href="#" onclick="resendCode(event)">Resend</a>
      </p>

    </form>

  </div>

  <!-- SUCCESS -->
  <div class="auth-box" id="successBox" style="display:none; text-align:center;">

    <div class="success-icon">✓</div>

    <h2>Account Created</h2>

    <p style="color:#9dadc1; margin:10px 0 26px; line-height:1.6;">
      Your account is ready. Log in using the same email and password you just signed up with.
    </p>

    <button class="primary" type="button" onclick="goToLogin()">Continue to Login</button>

    <p style="color:#7f8b9b; font-size:.82rem; margin-top:14px;" id="redirectNote"></p>

  </div>

</div>

<script src="script.js?v=4"></script>

<script>
// The Cloudflare Worker that actually sends the email via Resend
// NOTE: named OTP_WORKER_URL (not WORKER_URL) on purpose — script.js
// already declares a global const WORKER_URL, and two top-level const
// declarations with the same name across <script> tags throw a
// SyntaxError that silently kills this entire block. That was the bug
// causing the country dropdown (and signup itself) to stop working.
const OTP_WORKER_URL = "https://round-tree-9996.rkhansaif1999.workers.dev/";

// country fill
const countries = ["Afghanistan","Albania","Algeria","Andorra","Angola","Antigua and Barbuda","Argentina","Armenia","Australia","Austria","Azerbaijan","Bahamas","Bahrain","Bangladesh","Barbados","Belarus","Belgium","Belize","Benin","Bhutan","Bolivia","Bosnia and Herzegovina","Botswana","Brazil","Brunei","Bulgaria","Burkina Faso","Burundi","Cabo Verde","Cambodia","Cameroon","Canada","Central African Republic","Chad","Chile","China","Colombia","Comoros","Congo (Congo-Brazzaville)","Costa Rica","Croatia","Cuba","Cyprus","Czechia","Democratic Republic of the Congo","Denmark","Djibouti","Dominica","Dominican Republic","Ecuador","Egypt","El Salvador","Equatorial Guinea","Eritrea","Estonia","Eswatini","Ethiopia","Fiji","Finland","France","Gabon","Gambia","Georgia","Germany","Ghana","Greece","Grenada","Guatemala","Guinea","Guinea-Bissau","Guyana","Haiti","Honduras","Hungary","Iceland","India","Indonesia","Iran","Iraq","Ireland","Israel","Italy","Ivory Coast","Jamaica","Japan","Jordan","Kazakhstan","Kenya","Kiribati","Kuwait","Kyrgyzstan","Laos","Latvia","Lebanon","Lesotho","Liberia","Libya","Liechtenstein","Lithuania","Luxembourg","Madagascar","Malawi","Malaysia","Maldives","Mali","Malta","Marshall Islands","Mauritania","Mauritius","Mexico","Micronesia","Moldova","Monaco","Mongolia","Montenegro","Morocco","Mozambique","Myanmar","Namibia","Nauru","Nepal","Netherlands","New Zealand","Nicaragua","Niger","Nigeria","North Korea","North Macedonia","Norway","Oman","Pakistan","Palau","Palestine","Panama","Papua New Guinea","Paraguay","Peru","Philippines","Poland","Portugal","Qatar","Romania","Russia","Rwanda","Saint Kitts and Nevis","Saint Lucia","Saint Vincent and the Grenadines","Samoa","San Marino","Sao Tome and Principe","Saudi Arabia","Senegal","Serbia","Seychelles","Sierra Leone","Singapore","Slovakia","Slovenia","Solomon Islands","Somalia","South Africa","South Korea","South Sudan","Spain","Sri Lanka","Sudan","Suriname","Sweden","Switzerland","Syria","Taiwan","Tajikistan","Tanzania","Thailand","Timor-Leste","Togo","Tonga","Trinidad and Tobago","Tunisia","Turkey","Turkmenistan","Tuvalu","Uganda","Ukraine","United Arab Emirates","United Kingdom","United States","Uruguay","Uzbekistan","Vanuatu","Vatican City","Venezuela","Vietnam","Yemen","Zambia","Zimbabwe"];
const countrySelect = document.getElementById("country");

let pendingSignup = null;
countries.forEach(c=>{
  const opt=document.createElement("option");
  opt.value=c;
  opt.textContent=c;
  countrySelect.appendChild(opt);
});


function setMsg(id, text, type){
  const el = document.getElementById(id);
  el.textContent = text || "";
  el.className = "form-msg" + (type ? " " + type : "");
}


async function signupUser(event){
  event.preventDefault();

  const fullName=document.getElementById("fullName").value.trim();
  const email=document.getElementById("email").value.trim();
  const password=document.getElementById("password").value;
  const role=document.getElementById("role").value;
  const country=document.getElementById("country").value;
  const btn=document.getElementById("signupBtn");

  setMsg("signupMsg","","");
  btn.disabled = true;
  btn.textContent = "Sending code...";

  try {
    const response = await fetch(
  OTP_WORKER_URL + "api/send-otp",
  {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      email: email
    })
  }
);

const data = await response.json();

if(!response.ok){
    throw new Error(data.error || "Unable to send OTP.");
}

    pendingSignup={
    fullName,
    email,
    password,
    role,
    country
};

    document.getElementById("signupBox").style.display="none";
    document.getElementById("verifyBox").style.display="block";
  } catch (err) {
    setMsg("signupMsg", "Couldn't send verification email: " + err.message, "error");
  } finally {
    btn.disabled = false;
    btn.textContent = "Create Account";
  }
}

async function verifyCode(event){
  event.preventDefault();

  if(!pendingSignup){
    setMsg("verifyMsg","Signup session expired. Please sign up again.","error");
    return;
  }

  const code = document.getElementById("verifyInput").value.trim();

  setMsg("verifyMsg","","");

  try{

    const response = await fetch(
      OTP_WORKER_URL + "api/verify-otp",
      {
        method:"POST",
        headers:{
          "Content-Type":"application/json"
        },
        body:JSON.stringify({
          email: pendingSignup.email,
          code: code,
          fullName: pendingSignup.fullName,
          password: pendingSignup.password,
          role: pendingSignup.role,
          country: pendingSignup.country
        })
      }
    );

    const data = await response.json();

    if(!response.ok){
      throw new Error(data.error || "Verification failed.");
    }

    pendingSignup = null;

    showSuccessPanel();

  }catch(err){

    setMsg("verifyMsg", err.message, "error");

  }
}

function goToLogin(){
  window.location.href="login.html";
}

function showSuccessPanel(){
  document.getElementById("verifyBox").style.display="none";
  document.getElementById("successBox").style.display="block";

  let seconds = 4;
  const note = document.getElementById("redirectNote");
  note.textContent = `Redirecting to login in ${seconds}...`;

  const timer = setInterval(() => {
    seconds--;
    if (seconds <= 0) {
      clearInterval(timer);
      goToLogin();
    } else {
      note.textContent = `Redirecting to login in ${seconds}...`;
    }
  }, 1000);
}

async function resendCode(e){
  e.preventDefault();

  if(!pendingSignup){
    return;
  }

  setMsg("verifyMsg","Resending...","");

  try{

    const response = await fetch(
      OTP_WORKER_URL + "api/send-otp",
      {
        method:"POST",
        headers:{
          "Content-Type":"application/json"
        },
        body:JSON.stringify({
          email: pendingSignup.email
        })
      }
    );

    const data = await response.json();

    if(!response.ok){
      throw new Error(data.error || "Unable to resend code.");
    }

    setMsg("verifyMsg","A new verification code has been sent.","success");

  }catch(err){

    setMsg("verifyMsg",err.message,"error");

  }
}

/* particles */
const canvas=document.getElementById("particles");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let particles=[];

for(let i=0;i<55;i++){
  particles.push({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height,
    r:Math.random()*2,
    dx:(Math.random()-0.5)*0.4,
    dy:(Math.random()-0.5)*0.4
  });
}

function animate(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  particles.forEach(p=>{
    p.x+=p.dx;
    p.y+=p.dy;

    if(p.x<0||p.x>canvas.width) p.dx*=-1;
    if(p.y<0||p.y>canvas.height) p.dy*=-1;

    ctx.beginPath();
    ctx.fillStyle="rgba(120,200,255,0.35)";
    ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fill();
  });

  requestAnimationFrame(animate);
}
animate();
</script>
