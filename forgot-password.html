<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Forgot Password - Harmonia</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="noise"></div>

<div class="auth-container">

    <div class="auth-box">

        <form onsubmit="requestPasswordReset(event)">

            <div class="logo" style="margin-bottom:24px;">Harmonia</div>

            <h2>Forgot Password</h2>

            <p style="color:#9dadc1;font-size:.9rem;line-height:1.7;margin-bottom:18px;position:relative;z-index:2;">
                Enter the email on your account and we'll send you a 6-digit
                code to reset your password.
            </p>

            <input
                type="email"
                id="email"
                placeholder="Email"
                required
            >

            <button class="primary full" type="submit">
                Send Reset Code
            </button>

            <p class="auth-link">
                Remembered your password?
                <a href="login.html">Login</a>
            </p>

            <a class="back" href="index.html">
                ← Back to Home
            </a>

        </form>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
