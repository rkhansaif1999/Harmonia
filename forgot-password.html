  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Forgot Password - Harmonia</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="noise"></div>
<div class="auth-container">
    <div class="auth-box">
        <form onsubmit="requestPasswordReset(event)">
            <div class="logo" style="margin-bottom:24px;">Harmonia</div>
            <h2>Forgot Password</h2>
            <p style="color:#9dadc1;font-size:.9rem;line-height:1.7;margin-bottom:18px;position:relative;z-index:2;">
                Enter the email on your account and we'll send you a 6-digit
                code to reset your password.
            </p>
            <input
                type="email"
                id="email"
                placeholder="Email"
                required
            >
            <button class="primary full" type="submit" id="requestResetBtn">
                Send Reset Code
            </button>
            <p class="auth-link">
                Remembered your password?
                <a href="login.html">Login</a>
            </p>
            <a class="back" href="index.html">
                ← Back to Home
            </a>
        </form>
    </div>
</div>
<script src="script.js"></script>
<script>
// =========================================================
// Overrides the mock/localStorage requestPasswordReset() from
// script.js with a version that calls the real Worker backend.
// Loaded after script.js on purpose so this definition wins.
// The email is stashed in localStorage just long enough to carry
// it over to reset-password.html (that page has no email field).
// =========================================================
const RESET_EMAIL_KEY = "harmonia_reset_email";

async function requestPasswordReset(event) {
    event.preventDefault();

    const email = document.getElementById("email").value.trim();
    const btn = document.getElementById("requestResetBtn");

    btn.disabled = true;
    btn.textContent = "Sending...";

    try {
        const response = await fetch(WORKER_URL + "/api/forgot-password", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email })
        });

        let data;
        try {
            data = await response.json();
        } catch (e) {
            alert("Server returned an invalid response.");
            return;
        }

        if (!response.ok) {
            alert(data?.error || "Something went wrong. Please try again.");
            return;
        }

        localStorage.setItem(RESET_EMAIL_KEY, email);
        alert(data.status || "If an account exists for that email, a reset code has been sent.");
        window.location.href = "reset-password.html";

    } catch (err) {
        alert("Unable to connect to the server.");
        console.error(err);
    } finally {
        btn.disabled = false;
        btn.textContent = "Send Reset Code";
    }
}
</script>
</body>
</html>
