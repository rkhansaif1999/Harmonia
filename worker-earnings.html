<script>

/* =========================
   DATE / WEEK HELPERS
   ========================= */

function getEarningDate(entry) {
    if (!entry.createdAt) return null;
    const d = new Date(entry.createdAt);
    return isNaN(d.getTime()) ? null : d;
}

function getCurrentWeekRange() {
    const now = new Date();
    const day = now.getDay(); // 0 = Sun ... 6 = Sat
    const diffToMonday = (day === 0) ? 6 : day - 1;

    const monday = new Date(now);
    monday.setHours(0, 0, 0, 0);
    monday.setDate(now.getDate() - diffToMonday);

    const sunday = new Date(monday);
    sunday.setDate(monday.getDate() + 6);
    sunday.setHours(23, 59, 59, 999);

    return { start: monday, end: sunday };
}


function formatDateLong(date) {
    return date.toLocaleDateString(undefined, {
        weekday: "long",
        month: "long",
        day: "numeric",
        year: "numeric"
    });
}

function formatDateShort(date) {
    return date.toLocaleDateString(undefined, {
        month: "short",
        day: "numeric",
        year: "numeric"
    });
}

function capitalize(str) {
    if (!str) return "";
    return str.charAt(0).toUpperCase() + str.slice(1);
}

/* =========================
   LOAD + RENDER
   ========================= */

async function loadEarnings() {
    try {
        const response = await authFetch(WORKER_URL + "/api/worker/earnings-summary");
        const data = await response.json();

        if (!response.ok) {
            console.error("Failed to load earnings summary:", data?.error);
            return;
        }

        document.getElementById("totalEarnedAllTime").textContent = "$" + Number(data.totalPaid).toFixed(2);
document.getElementById("weeklyPending").textContent = "$" + Number(data.totalPending).toFixed(2);

        const { start, end } = getCurrentWeekRange();
        document.getElementById("weekRangeLabel").textContent =
            formatDateShort(start) + " – " + formatDateShort(end);

        document.getElementById("nextPayoutDate").textContent = "Coming Soon";

    } catch (err) {
        console.error(err);
    }
}

loadEarnings();

</script>
