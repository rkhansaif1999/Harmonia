<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reset Password - Harmonia</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="noise"></div>

<div class="auth-container">

    <div class="auth-box">

        <form onsubmit="resetPassword(event)">

            <div class="logo" style="margin-bottom:24px;">Harmonia</div>

            <h2>Reset Password</h2>

            <p style="color:#9dadc1;font-size:.9rem;line-height:1.7;margin-bottom:18px;position:relative;z-index:2;">
                Enter the 6-digit code we sent you, along with your new password.
            </p>

            <input
                type="text"
                id="resetCode"
                placeholder="6-digit code"
                maxlength="6"
                required
            >

            <input
                type="password"
                id="newPassword"
                placeholder="New password (min 8 characters)"
                minlength="8"
                required
            >

            <input
                type="password"
                id="confirmPassword"
                placeholder="Confirm new password"
                minlength="8"
                required
            >

            <button class="primary full" type="submit">
                Reset Password
            </button>

            <p class="auth-link" id="resendNote">
                Didn't get a code? <a href="#" onclick="resendResetCode(event)">Resend</a>
            </p>

            <a class="back" href="login.html">
                ← Back to Login
            </a>

        </form>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
