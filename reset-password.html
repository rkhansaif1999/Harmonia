<body>
<div class="noise"></div>
<div class="auth-container">
    <div class="auth-box">
        <form onsubmit="resetPassword(event)">
            <div class="logo" style="margin-bottom:24px;">Harmonia</div>
            <h2>Reset Password</h2>
            <p style="color:#9dadc1;font-size:.9rem;line-height:1.7;margin-bottom:18px;position:relative;z-index:2;">
                Enter the 6-digit code we sent you, along with your new password.
            </p>
            <input
                type="text"
                id="resetCode"
                placeholder="6-digit code"
                maxlength="6"
                required
            >
            <input
                type="password"
                id="newPassword"
                placeholder="New password (min 8 characters)"
                minlength="8"
                required
            >
            <input
                type="password"
                id="confirmPassword"
                placeholder="Confirm new password"
                minlength="8"
                required
            >
            <button class="primary full" type="submit" id="resetPasswordBtn">
                Reset Password
            </button>
            <p class="auth-link" id="resendNote">
                Didn't get a code? <a href="#" onclick="resendResetCode(event)">Resend</a>
            </p>
            <a class="back" href="login.html">
                ← Back to Login
            </a>
        </form>
    </div>
</div>
<script src="script.js"></script>
<script>
// =========================================================
// Overrides the mock/localStorage resetPassword() and
// resendResetCode() from script.js with versions that call the
// real Worker backend. Loaded after script.js on purpose so
// these definitions win.
// =========================================================
const RESET_EMAIL_KEY = "harmonia_reset_email";

function getResetEmail() {
    const email = localStorage.getItem(RESET_EMAIL_KEY);
    if (!email) {
        alert("Your reset session expired. Please start over.");
        window.location.href = "forgot-password.html";
        return null;
    }
    return email;
}

async function resetPassword(event) {
    event.preventDefault();

    const email = getResetEmail();
    if (!email) return;

    const code = document.getElementById("resetCode").value.trim();
    const newPassword = document.getElementById("newPassword").value;
    const confirmPassword = document.getElementById("confirmPassword").value;
    const btn = document.getElementById("resetPasswordBtn");

    if (newPassword.length < 8) {
        alert("Password must be at least 8 characters long.");
        return;
    }

    if (newPassword !== confirmPassword) {
        alert("Passwords do not match.");
        return;
    }

    btn.disabled = true;
    btn.textContent = "Resetting...";

    try {
        const response = await fetch(WORKER_URL + "/api/reset-password", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email, code, newPassword })
        });

        let data;
        try {
            data = await response.json();
        } catch (e) {
            alert("Server returned an invalid response.");
            return;
        }

        if (!response.ok) {
            alert(data?.error || "Could not reset password. Please try again.");
            return;
        }

        localStorage.removeItem(RESET_EMAIL_KEY);
        alert(data.status || "Password reset successful. Please log in.");
        window.location.href = "login.html";

    } catch (err) {
        alert("Unable to connect to the server.");
        console.error(err);
    } finally {
        btn.disabled = false;
        btn.textContent = "Reset Password";
    }
}

async function resendResetCode(event) {
    event.preventDefault();

    const email = getResetEmail();
    if (!email) return;

    try {
        const response = await fetch(WORKER_URL + "/api/reset-password/resend-code", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email })
        });

        let data;
        try {
            data = await response.json();
        } catch (e) {
            alert("Server returned an invalid response.");
            return;
        }

        if (!response.ok) {
            alert(data?.error || "Could not resend code. Please try again.");
            return;
        }

        alert(data.status || "A new code has been sent if an account exists for that email.");

    } catch (err) {
        alert("Unable to connect to the server.");
        console.error(err);
    }
}
</script>
